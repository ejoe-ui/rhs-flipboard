<!DOCTYPE html>
<html lang="en" data-theme="retro-dark">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<meta name="viewport" content="width=1920">
<title>Cowboy Wire · Riverdale High School</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=League+Spartan:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --font-retro:   'Courier New', Courier, monospace;
    --font-modern:  'Barlow Condensed', sans-serif;
    --font-label:   'League Spartan', sans-serif;
    --tan:          #C4BEB5;
  }

  [data-theme="retro-dark"] {
    --green: #005640; --green-dark: #003d2e; --green-dim: #002a1a;
    --tile-bg: #1a1a1a; --tile-border: #2c2c2c; --tile-text: #f0ebe0;
    --board-bg: #0d0d0d; --header-bg: #0a0a0a; --flip-mid: #005640;
    --font-tile: var(--font-retro); --font-ui: var(--font-retro);
    --scaleX: 0.78; --scanline: 1;
  }
  [data-theme="retro-light"] {
    --green: #005640; --green-dark: #003d2e; --green-dim: #d0e8e0;
    --tile-bg: #e8e4dc; --tile-border: #c8c3b8; --tile-text: #005640;
    --board-bg: #f0ede6; --header-bg: #0d0d0d; --flip-mid: #005640;
    --font-tile: var(--font-retro); --font-ui: var(--font-retro);
    --scaleX: 0.78; --scanline: 0;
  }
  [data-theme="modern-dark"] {
    --green: #00a86b; --green-dark: #007a4d; --green-dim: #002a1a;
    --tile-bg: #141414; --tile-border: #242424; --tile-text: #f0ebe0;
    --board-bg: #0a0a0a; --header-bg: #080808; --flip-mid: #00a86b;
    --font-tile: var(--font-modern); --font-ui: var(--font-label);
    --scaleX: 1; --scanline: 0;
  }
  [data-theme="modern-light"] {
    --green: #005640; --green-dark: #003d2e; --green-dim: #d0e8e0;
    --tile-bg: #ffffff; --tile-border: #ddd8d0; --tile-text: #005640;
    --board-bg: #f4f2ef; --header-bg: #0d0d0d; --flip-mid: #005640;
    --font-tile: var(--font-modern); --font-ui: var(--font-label);
    --scaleX: 1; --scanline: 0;
  }

  html, body { width: 100%; height: 100%; background: var(--board-bg); overflow: hidden; font-family: var(--font-ui); transition: background 0.3s; }
  body::after { content: ''; position: fixed; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px); pointer-events: none; z-index: 100; opacity: var(--scanline, 0); transition: opacity 0.4s; }

  /* ══ HEADER ══ */
  #header {
    position: relative; width: 100%; height: 10vh;
    min-height: 56px; max-height: 80px;
    background: var(--header-bg);
    border-bottom: 3px solid var(--green);
    display: flex; align-items: center;
    padding: 0 1.5vw; gap: 1.5vw;
    z-index: 10; overflow: hidden; transition: border-color 0.3s;
  }
  .h-badge { background: var(--green); color: #fff; font-family: var(--font-ui); font-size: clamp(10px,1vw,16px); font-weight: 900; letter-spacing: 0.15em; padding: 5px 14px; border-radius: 3px; text-transform: uppercase; white-space: nowrap; flex-shrink: 0; transition: background 0.3s; }
  .h-divider { flex: 1; min-width: 8px; height: 1px; background: linear-gradient(90deg,rgba(196,190,181,0.25),rgba(196,190,181,0.05)); }
  .h-school { color: var(--tan); font-family: var(--font-ui); font-size: clamp(10px,1.1vw,18px); letter-spacing: 0.2em; text-transform: uppercase; white-space: nowrap; flex-shrink: 1; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
  .h-sync { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #333; transition: background 0.4s; flex-shrink: 0; }
  .sync-dot.live  { background: var(--green); animation: blink 2.5s infinite; }
  .sync-dot.error { background: #882222; }
  .sync-label { color: #555; font-family: var(--font-retro); font-size: clamp(8px,0.65vw,11px); letter-spacing: 0.12em; text-transform: uppercase; white-space: nowrap; }

  /* ══ PERIOD TIMER + PASS STATUS ══ */
  .h-period-timer { display: flex; flex-direction: column; align-items: flex-end; flex-shrink: 0; gap: 1px; }
  .h-period-label { font-family: var(--font-ui); font-size: clamp(8px,0.7vw,12px); letter-spacing: 0.15em; color: var(--green); text-transform: uppercase; white-space: nowrap; font-weight: 700; }
  .h-period-time  { font-family: var(--font-ui); font-size: clamp(10px,0.9vw,15px); letter-spacing: 0.1em; color: var(--tan); white-space: nowrap; font-weight: 700; }
  .h-period-time.warning { color: #ff9900; }
  .h-period-time.ending  { color: #cc4444; animation: blink 1s infinite; }

  /* Pass status pill — sits below period time */
  .h-pass-status {
    font-family: var(--font-ui);
    font-size: clamp(7px,0.65vw,11px);
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    white-space: nowrap;
    padding: 2px 7px;
    border-radius: 3px;
    transition: background 0.4s, color 0.4s;
  }
  .h-pass-status.green  { background: #166534; color: #ffffff; }
  .h-pass-status.yellow { background: #d97706; color: #ffffff; }
  .h-pass-status.red    { background: #dc2626; color: #ffffff; }
  .h-pass-status.blue   { background: #1d4ed8; color: #ffffff; }
  .h-pass-status.hidden { display: none; }

  .h-clock { color: #f0ebe0; font-family: var(--font-ui); font-size: clamp(18px,2.2vw,38px); font-weight: 700; letter-spacing: 0.08em; white-space: nowrap; flex-shrink: 0; text-align: right; }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

  /* ══ BOARD ══ */
  #board-wrap { width: 100%; height: calc(100vh - 10vh - 3px); display: flex; flex-direction: column; padding: 1.2vh 1.5vw; gap: 0.5vh; }
  .tile-row { flex: 1; display: flex; gap: 0.3vw; align-items: stretch; }
  .tile { flex: 1; background: var(--tile-bg); border: 1px solid var(--tile-border); border-radius: 4px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; transition: background 0.3s, border-color 0.3s; }
  .tile::after { content: ''; position: absolute; left: 4%; right: 4%; top: 50%; height: 1px; background: rgba(0,0,0,0.2); transform: translateY(-50%); z-index: 2; }
  .tile-char { font-size: clamp(24px,6.4vh,112px); font-weight: 900; color: var(--tile-text); line-height: 1; letter-spacing: -0.02em; user-select: none; position: relative; z-index: 3; font-family: var(--font-tile); transform: scaleX(var(--scaleX, 0.78)); transition: font-family 0s, color 0.3s; }

  @keyframes flipDown {
    0%   { transform:scaleY(1)    scaleX(var(--scaleX,0.78)); background:var(--tile-bg); }
    25%  { transform:scaleY(0.3)  scaleX(var(--scaleX,0.78)); background:var(--flip-mid); }
    45%  { transform:scaleY(0.02) scaleX(var(--scaleX,0.78)); background:var(--flip-mid); }
    65%  { transform:scaleY(0.02) scaleX(var(--scaleX,0.78)); background:var(--flip-mid); }
    85%  { transform:scaleY(0.4)  scaleX(var(--scaleX,0.78)); background:var(--tile-bg); }
    100% { transform:scaleY(1)    scaleX(var(--scaleX,0.78)); background:var(--tile-bg); }
  }
  .tile.flipping { animation: flipDown 0.65s cubic-bezier(0.4,0,0.2,1) forwards; }
  .tile-row:nth-child(odd) .tile { border-color: color-mix(in srgb, var(--tile-border) 80%, transparent); }

  #bottom-accent { position: fixed; bottom: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, var(--green-dark) 0%, var(--green) 30%, var(--tan) 50%, var(--green) 70%, var(--green-dark) 100%); z-index: 10; }

  /* ══ HONOR ROLL ══ */
  #honor-ticker-wrap { position: fixed; bottom: 4px; left: 0; right: 0; height: 28px; background: rgba(0,0,0,0.82); border-top: 1px solid var(--green-dim); z-index: 9; overflow: hidden; display: none; align-items: center; }
  #honor-ticker-label { background: var(--green); color: #fff; font-family: var(--font-retro); font-size: 10px; font-weight: 900; letter-spacing: 0.18em; text-transform: uppercase; padding: 0 12px; height: 100%; display: flex; align-items: center; white-space: nowrap; flex-shrink: 0; }
  #honor-ticker-track { flex:1; overflow:hidden; position:relative; height:100%; }
  #honor-ticker-inner { display: inline-flex; align-items: center; height: 100%; white-space: nowrap; animation: tickerScroll 400s linear infinite; will-change: transform; }
  @keyframes tickerScroll { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
  .ticker-name  { font-size:11px; font-weight:700; color:var(--tan); letter-spacing:0.1em; text-transform:uppercase; padding:0 6px; }
  .ticker-sep   { color:var(--green); font-size:10px; padding:0 4px; opacity:0.7; }
  .ticker-grade { font-size:9px; color:#555; letter-spacing:0.12em; text-transform:uppercase; padding:0 2px 0 0; }

  #indicator-bar { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); display: flex; gap: 7px; align-items: center; z-index: 50; }
  .ind-dot { width: 7px; height: 7px; border-radius: 50%; background: #2a2a2a; transition: background 0.3s; }
  .ind-dot.active { background: var(--green); }

  .dial-sound-row { display: flex; align-items: center; justify-content: space-between; width: 100%; padding-top: 10px; border-top: 1px solid #1e1e1e; gap: 8px; }
  .dial-sound-label { font-family: var(--font-retro); font-size: 8px; letter-spacing: 0.2em; text-transform: uppercase; color: #444; }
  #soundToggleBtn { background: #1a1a1a; border: 1px solid #2a2a2a; color: #555; font-family: var(--font-retro); font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; padding: 5px 10px; border-radius: 3px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
  #soundToggleBtn:hover { border-color: var(--green); color: var(--green); }

  #sound-prompt { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,86,64,0.85); color: #fff; font-family: var(--font-retro); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; padding: 7px 18px; border-radius: 4px; cursor: pointer; z-index: 200; transition: opacity 0.5s; }

  #dial-trigger { position: fixed; bottom: 0; right: 0; width: 80px; height: 80px; z-index: 60; cursor: pointer; }
  #dial-panel { position: fixed; bottom: 20px; right: 20px; background: #111; border: 1px solid #2a2a2a; border-radius: 12px; padding: 16px 18px; z-index: 60; opacity: 0; pointer-events: none; transform: translateY(8px) scale(0.96); transition: opacity 0.2s, transform 0.2s; display: flex; flex-direction: column; align-items: center; gap: 12px; min-width: 200px; }
  #dial-panel.open { opacity: 1; pointer-events: all; transform: translateY(0) scale(1); }
  .dial-panel-title { font-family: var(--font-retro); font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase; color: #444; }
  .dial-mode-name { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--green); transition: color 0.3s; min-height: 24px; }
  .dial-knob-wrap { position: relative; width: 80px; height: 80px; cursor: pointer; }
  .dial-knob { width: 80px; height: 80px; border-radius: 50%; background: #1a1a1a; border: 2px solid #2a2a2a; box-shadow: inset 0 2px 6px rgba(0,0,0,0.8); position: relative; transition: transform 0.05s; }
  .dial-knob:active { transform: scale(0.96); }
  .dial-needle { position: absolute; width: 3px; height: 18px; background: var(--green); border-radius: 2px; left: 50%; top: 6px; transform-origin: 50% 34px; transform: translateX(-50%) rotate(-135deg); transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.3s; box-shadow: 0 0 4px rgba(0,86,64,0.4); }
  .dial-center-dot { position: absolute; width: 14px; height: 14px; background: #222; border: 1px solid #333; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); }
  .dial-positions { display: flex; gap: 6px; align-items: center; }
  .dial-pos { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; }
  .dial-pos-dot { width: 7px; height: 7px; border-radius: 50%; background: #2a2a2a; border: 1px solid #333; transition: background 0.2s, transform 0.2s, box-shadow 0.2s; }
  .dial-pos-dot.active { background: var(--green); border-color: var(--green); transform: scale(1.4); box-shadow: 0 0 4px rgba(0,86,64,0.5); }
  .dial-pos-label { font-family: var(--font-retro); font-size: 8px; letter-spacing: 0.1em; color: #333; text-transform: uppercase; transition: color 0.2s; }
  .dial-pos-label.active { color: var(--green); }
  .dial-divider { width: 1px; height: 16px; background: #2a2a2a; }
  #dial-hint { position: fixed; bottom: 12px; right: 16px; font-family: var(--font-retro); font-size: 8px; letter-spacing: 0.15em; text-transform: uppercase; color: #2a2a2a; z-index: 59; transition: color 0.2s; cursor: pointer; }
  #dial-hint:hover { color: #444; }
  body:hover #dial-hint { color: #2e2e2e; }
</style>
</head>
<body>

<!-- ══ HEADER ══ -->
<div id="header">
  <div class="h-badge" id="roomBadge">RHS · ROOM 27</div>
  <div class="h-divider"></div>
  <div class="h-school">COWBOY WIRE · RIVERDALE PONY EXPRESS</div>
  <div class="h-divider"></div>
  <div class="h-sync">
    <div class="sync-dot" id="syncDot"></div>
    <span class="sync-label" id="syncLabel">Starting...</span>
  </div>
  <div class="h-divider" style="max-width:2vw"></div>
  <!-- Period timer + pass status pill -->
  <div class="h-period-timer" id="periodTimer" style="display:none">
    <div class="h-period-label" id="periodLabel"></div>
    <div class="h-period-time"  id="periodTime"></div>
    <div class="h-pass-status hidden" id="passStatusPill"></div>
  </div>
  <div class="h-divider" style="max-width:1vw"></div>
  <div class="h-clock" id="clock">--:-- --</div>
</div>

<!-- ══ BOARD ══ -->
<div id="board-wrap"></div>

<!-- ══ HONOR ROLL TICKER ══ -->
<div id="honor-ticker-wrap">
  <div id="honor-ticker-label">&#127891; Honor Roll</div>
  <div id="honor-ticker-track">
    <div id="honor-ticker-inner"></div>
  </div>
</div>

<!-- ══ BOTTOM ACCENT ══ -->
<div id="bottom-accent"></div>

<!-- ══ INDICATOR DOTS ══ -->
<div id="indicator-bar"></div>

<!-- ══ SOUND PROMPT ══ -->
<div id="sound-prompt" onclick="enableSound(this)">▶ Click to enable flip sound</div>

<!-- ══ MODE DIAL ══ -->
<div id="dial-hint" onclick="toggleDial()">◎ MODE</div>
<div id="dial-trigger" onclick="toggleDial()"></div>

<div id="dial-panel">
  <div class="dial-panel-title">Cowboy Wire · Display Mode</div>
  <div class="dial-mode-name" id="dialModeName">Retro · Dark</div>
  <div class="dial-knob-wrap" onclick="dialNext()">
    <div class="dial-knob">
      <div class="dial-needle" id="dialNeedle"></div>
      <div class="dial-center-dot"></div>
    </div>
  </div>
  <div class="dial-positions" id="dialPositions"></div>
  <div class="dial-sound-row">
    <span class="dial-sound-label">Sound</span>
    <button id="soundToggleBtn" onclick="cycleSoundProfile()">🔊 CLASSIC</button>
  </div>
</div>

<!-- ══ SCRIPTS ══ -->
<script src="config.js"></script>
<script src="cowboy-wire-core.js"></script>
<script>

document.getElementById('roomBadge').textContent = CLASSROOM_CONFIG.badge;
document.title = 'Cowboy Wire · ' + CLASSROOM_CONFIG.badge;

let messages    = [];

function dToMins(t) { const [h,m]=t.split(':').map(Number); return h*60+m; }
function dNowMins() { const n=new Date(); return n.getHours()*60+n.getMinutes(); }
function dDateStr(d) { return d.toISOString().split('T')[0]; }

function _displaySchoolDaysThisWeek(date) {
  const day=date.getDay(), monday=new Date(date);
  monday.setDate(date.getDate()-(day===0?6:day-1));
  let count=0;
  for(let i=0;i<5;i++){const d=new Date(monday);d.setDate(monday.getDate()+i);if(!NO_SCHOOL_DISPLAY.includes(dDateStr(d)))count++;}
  return count;
}

function getDisplaySchedule() {
  const now = new Date(), ds = dDateStr(now), dow = now.getDay();
  if (dow===0||dow===6||NO_SCHOOL_DISPLAY.includes(ds)) return null;
  // ── Finals hardcode — REMOVE AFTER JUNE 12, 2026 ────────────────────────
  const FINALS_MAP = {'2026-06-08':'finals1','2026-06-09':'finals2','2026-06-10':'finals3','2026-06-11':'finals4','2026-06-12':'minimum'};
  if (FINALS_MAP[ds]) return DISPLAY_SCHEDULES[FINALS_MAP[ds]];
  const titles = (window._cwCalEvents||[]).filter(e => e.start && e.start.substring(0,10)===ds).map(e=>(e.title||'').toLowerCase());
  const has = kw => titles.some(t=>t.includes(kw));
  if (has('foggy')||has('late arrival')) return DISPLAY_SCHEDULES.foggy;
  if (has('minimum')) return DISPLAY_SCHEDULES.minimum;
  if (has('code day')) return DISPLAY_SCHEDULES.codeDay;
  if (has('activity')) return DISPLAY_SCHEDULES.activity;
  if (has('block')) return dow===3 ? DISPLAY_SCHEDULES.blockWed : DISPLAY_SCHEDULES.blockThu;
  if (has('early release')) return DISPLAY_SCHEDULES.earlyRelease;
  // ── Holiday week check — runs before day-of-week defaults ────────────────
  if (_displaySchoolDaysThisWeek(now)<=4) return DISPLAY_SCHEDULES.regular;
  // ── Normal week defaults ─────────────────────────────────────────────────
  if (dow===1) return DISPLAY_SCHEDULES.earlyRelease;
  if (dow===3) return DISPLAY_SCHEDULES.blockWed;
  if (dow===4) return DISPLAY_SCHEDULES.blockThu;
  return DISPLAY_SCHEDULES.regular;
}

function updatePassStatusPill() {
  const pill = document.getElementById('passStatusPill');
  if (!pill) return;
  const schedule = getDisplaySchedule();
  if (!schedule) { pill.className = 'h-pass-status hidden'; return; }
  const nm = dNowMins();
  for (const p of schedule.periods) {
    const s = dToMins(p.start), e = dToMins(p.end);
    if (nm >= s && nm < e) {
      if (p.break) {
        const next = schedule.periods[schedule.periods.indexOf(p)+1];
        pill.className = 'h-pass-status blue';
        pill.textContent = `⏸ ${p.label}${next ? ' · '+( dToMins(next.start)-nm)+' min' : ''}`;
        return;
      }
      const left = e - nm, sinceStart = nm - s;
      if (sinceStart < 15) {
        pill.className = 'h-pass-status red';
        pill.textContent = `🔴 Hold · OK in ${15-sinceStart}m`;
      } else if (left <= 15) {
        pill.className = 'h-pass-status red';
        pill.textContent = `🔴 Last ${left} min`;
      } else if (left <= 20) {
        pill.className = 'h-pass-status yellow';
        pill.textContent = `🟡 Last chance · ${left} min`;
      } else {
        pill.className = 'h-pass-status green';
        pill.textContent = `🟢 OK · ${left} min`;
      }
      return;
    }
  }
  pill.className = 'h-pass-status hidden';
}

function padCenter(text, cols) {
  text = (text || '').toUpperCase().substring(0, cols);
  const total = cols - text.length, left = Math.floor(total / 2);
  return ' '.repeat(left) + text + ' '.repeat(total - left);
}

function padLeft(text, cols) {
  text = (text || '').toUpperCase().substring(0, cols);
  return text + ' '.repeat(Math.max(0, cols - text.length));
}

function animateTile(tile, finalChar, delay) {
  return new Promise(resolve => {
    setTimeout(() => {
      let step = 0;
      const iv = setInterval(() => {
        const rnd = CHARS[Math.floor(Math.random() * CHARS.length)];
        tile.charEl.textContent = rnd;
        tile.el.style.background = step % 2 === 0 ? '#0f2a1a' : '#162c1e';
        tile.charEl.style.color  = step % 2 === 0 ? '#00cc66' : '#C4BEB5';
        step++;
        if (step >= SCRAMBLE_STP) {
          clearInterval(iv);
          const ch = (finalChar || ' ').trim();
          tile.charEl.textContent = ch;
          tile.charEl.style.color = 'var(--tile-text)';
          tile.el.style.background = 'var(--tile-bg)';
          tile.el.classList.add('flipping');
          tile.el.addEventListener('animationend', () => { tile.el.classList.remove('flipping'); resolve(); }, { once: true });
        }
      }, SCRAMBLE_MS);
    }, delay);
  });
}

function showMessage(idx) {
  if (!messages.length) return;
  idx = ((idx % messages.length) + messages.length) % messages.length;
  currentIdx = idx;

  updateDots();

  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) if (newLines[r][c] !== prevLines[r][c]) changedTiles++;
  if (changedTiles > 0) playFlipSound(changedTiles);

  prevLines = newLines;
  scheduleNext(msg.speed || 8);
}

const SLOT_TOKENS = {
  '[CALENDAR]':  { _isCalendarPlaceholder:  true, speed: 15 },
  '[SCHEDULE]':  { _isSchedulePlaceholder:  true, speed: 15 },
  '[BIRTHDAY]':  { _isBirthdayPlaceholder:  true, speed: 12 },

  '[MENU]':      { _isMenuPlaceholder:      true, speed: 15 },
};

function parseCSV(csv) {
  const rows = csv.trim().split('\n').filter(r => r.trim());
  if (rows.length < 2) return null;
  const header = rows[0].toLowerCase().replace(/\r/g,'').split(',').map(h => h.replace(/^"|"$/g,'').trim());
  const sIdx = header.findIndex(h => h === 'screen'), tIdx = header.findIndex(h => h === 'text'), spIdx = header.findIndex(h => h === 'speed');
  if (sIdx < 0 || tIdx < 0) return null;
  const screens = {};
  for (let i = 1; i < rows.length; i++) {
    const cols = rows[i].replace(/\r/g,'').split(',');
    const clean = c => c >= 0 ? (cols[c]||'').replace(/^"|"$/g,'').trim() : '';
    const scr = clean(sIdx), text = clean(tIdx).toUpperCase(), sp = spIdx >= 0 ? parseFloat(clean(spIdx)) || null : null;
    if (!scr) continue;
    if (!screens[scr]) screens[scr] = { lines: [], speed: 8 };
    screens[scr].lines.push(text);
    if (sp) screens[scr].speed = sp;
  }
  return Object.values(screens).map(s => {
    const first = s.lines.find(l => l.trim()) || '';
    if (SLOT_TOKENS[first]) return { lines: Array(7).fill(''), speed: s.speed || SLOT_TOKENS[first].speed, ...SLOT_TOKENS[first] };
    return s;
  }).filter(s => { const isSlot = Object.values(SLOT_TOKENS).some(t => Object.keys(t).some(k => s[k])); return isSlot || s.lines[0]; }) || null;
}

async function fetchSheet(url) {
  try {
    const res = await fetch(url, { cache: 'no-store', mode: 'cors' });
    if (res.ok) { const parsed = parseCSV(await res.text()); if (parsed) return parsed; }
  } catch(e) {}
  return new Promise(resolve => {
    const id = (url.match(/spreadsheets\/d\/([a-zA-Z0-9_-]+)/) || [])[1];
    const gid = (url.match(/gid=(\d+)/) || ['','0'])[1];
    if (!id) { resolve(null); return; }
    const cb = '_gviz_' + Date.now(), src = document.createElement('script');
    let done = false;
    const finish = (val) => { if (done) return; done = true; clearTimeout(timer); delete window[cb]; src.remove(); resolve(val); };
    const timer = setTimeout(() => finish(null), 8000);
    window[cb] = (data) => { try { finish(parseGviz(data)); } catch(e) { finish(null); } };
    src.src = `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json&tq=select+*&gid=${gid}&cb=${cb}`;
    src.onerror = () => finish(null);
    document.head.appendChild(src);
  });
}

function parseGviz(data) {
  if (!data?.table) return null;
  const cols = data.table.cols || [], rows = data.table.rows || [];
  const hdr = cols.map(c => (c.label||'').toLowerCase().trim());
  const sIdx = hdr.findIndex(h => h === 'screen'), tIdx = hdr.findIndex(h => h === 'text'), spIdx = hdr.findIndex(h => h === 'speed');
  if (sIdx < 0 || tIdx < 0) return null;
  const screens = {};
  for (const row of rows) {
    const c = row.c || [], val = i => i >= 0 && c[i]?.v != null ? String(c[i].v).trim() : '';
    const scr = val(sIdx), txt = val(tIdx).toUpperCase(), sp = spIdx >= 0 ? parseFloat(val(spIdx)) || null : null;
    if (!scr) continue;
    if (!screens[scr]) screens[scr] = { lines:[], speed:8 };
    screens[scr].lines.push(txt);
    if (sp) screens[scr].speed = sp;
  }
  return Object.values(screens).map(s => {
    const first = s.lines.find(l => l.trim()) || '';
    if (SLOT_TOKENS[first]) return { lines: Array(7).fill(''), speed: s.speed || SLOT_TOKENS[first].speed, ...SLOT_TOKENS[first] };
    return s;
  }).filter(s => { const isSlot = Object.values(SLOT_TOKENS).some(t => Object.keys(t).some(k => s[k])); return isSlot || s.lines[0]; }) || null;
}

function smartMerge(fresh) {
  return fresh.map(item => {
    for (const [key, flags] of Object.entries(CW_SLOT_MAP)) {
      if (item[flags.ph]) { const existing = messages.find(m => m[flags.ph] || m[flags.sl]); return existing || item; }
    }
    return item;
  });
}

function getAudioCtx() { if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { return null; } } return audioCtx?.state === 'suspended' ? null : audioCtx; }
function enableSound(el) { if (!audioCtx) try { audioCtx = new (window.AudioContext||window.webkitAudioContext)(); } catch(e) {} if (audioCtx?.state === 'suspended') audioCtx.resume(); if (soundIdx === 0) { soundIdx = 1; updateSoundBtn(); } if (el) { el.style.opacity='0'; setTimeout(()=>el.remove(),600); } playFlipSound(5); }
function cycleSoundProfile() { if (audioCtx?.state === 'suspended') audioCtx.resume(); soundIdx = (soundIdx + 1) % SOUND_PROFILES.length; try { localStorage.setItem('cw-sound-profile', SOUND_PROFILES[soundIdx]); } catch(e) {} updateSoundBtn(); if (SOUND_PROFILES[soundIdx] !== 'OFF') playFlipSound(6); }
function updateSoundBtn() { const btn = document.getElementById('soundToggleBtn'); if (!btn) return; const labels = { OFF:'🔇 OFF', CLASSIC:'🔊 CLASSIC', JADE:'⌨️ JADE CRISP', DIGITAL:'💾 DIGITAL' }; btn.textContent = labels[SOUND_PROFILES[soundIdx]]; btn.style.opacity = soundIdx === 0 ? '0.4' : '0.8'; btn.style.borderColor = soundIdx === 0 ? '#333' : 'var(--green)'; btn.style.color = soundIdx === 0 ? '#555' : 'var(--green)'; }

function playClassicClick(ctx, time, vol) { const buf = ctx.createBuffer(1, Math.floor(ctx.sampleRate*0.09), ctx.sampleRate); const data = buf.getChannelData(0); for (let i=0;i<data.length;i++) { const t = i/data.length; data[i] = ((Math.random()*2-1)*0.65 + Math.sin(2*Math.PI*160*i/ctx.sampleRate)*0.35) * Math.pow(1-t,2.8); } const src = ctx.createBufferSource(); src.buffer = buf; const f = ctx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=800; f.Q.value=1.2; const g = ctx.createGain(); g.gain.value = vol||0.18; src.connect(f); f.connect(g); g.connect(ctx.destination); src.start(time); }
function playClassicSound(n) { const ctx=getAudioCtx(); if(!ctx)return; const now=ctx.currentTime, clicks=Math.min(Math.max(Math.floor(n*0.5),4),20); for(let i=0;i<clicks;i++) playClassicClick(ctx, now+(i/clicks)*2.8, 0.08+Math.sin(i/clicks*Math.PI)*0.14); }
function playJadeCrisp(n) { const ctx = getAudioCtx(); if (!ctx) return; const now=ctx.currentTime, freq=1800, decay=0.015, clean=2.8, vol=0.26, spread=Math.min(n*0.008,1.8), count=Math.min(Math.max(Math.floor(n*0.6),4),60); for (let i=0;i<count;i++) { const jitter=(Math.random()-0.5)*0.04, t=now+(i/count)*spread+Math.max(0,jitter), v=vol*(0.75+Math.random()*0.25); const osc=ctx.createOscillator(), gain=ctx.createGain(); osc.type='square'; osc.frequency.setValueAtTime(freq,t); osc.frequency.exponentialRampToValueAtTime(freq*0.45,t+decay); gain.gain.setValueAtTime(0,t); gain.gain.linearRampToValueAtTime(v,t+0.0003); gain.gain.exponentialRampToValueAtTime(0.001,t+decay*1.5); const f=ctx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=freq; f.Q.value=clean; osc.connect(f); f.connect(gain); gain.connect(ctx.destination); osc.start(t); osc.stop(t+decay*2); const rt=t+decay*2.5, osc2=ctx.createOscillator(), g2=ctx.createGain(); osc2.type='square'; osc2.frequency.setValueAtTime(freq*0.55,rt); osc2.frequency.exponentialRampToValueAtTime(freq*0.2,rt+decay); g2.gain.setValueAtTime(0,rt); g2.gain.linearRampToValueAtTime(v*0.45,rt+0.0003); g2.gain.exponentialRampToValueAtTime(0.001,rt+decay); const f2=ctx.createBiquadFilter(); f2.type='bandpass'; f2.frequency.value=freq*0.55; f2.Q.value=clean*0.8; osc2.connect(f2); f2.connect(g2); g2.connect(ctx.destination); osc2.start(rt); osc2.stop(rt+decay*1.5); } }
function playDigitalBeep(ctx,time,vol,freq) { const osc=ctx.createOscillator(); const g=ctx.createGain(); osc.type='square'; osc.frequency.value=freq||880; g.gain.setValueAtTime(0,time); g.gain.linearRampToValueAtTime(vol||0.12,time+0.004); g.gain.setValueAtTime(vol||0.12,time+0.028); g.gain.linearRampToValueAtTime(0,time+0.034); const f=ctx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=freq||880; f.Q.value=3; osc.connect(f); f.connect(g); g.connect(ctx.destination); osc.start(time); osc.stop(time+0.05); }
function playDigitalSound(n) { const ctx=getAudioCtx(); if(!ctx)return; const now=ctx.currentTime, beeps=Math.min(Math.max(Math.floor(n*0.4),3),16); const freqs=[1100,990,880,770,990,1100,880,770]; for(let i=0;i<beeps;i++) playDigitalBeep(ctx, now+(i/beeps)*2.8, 0.08+Math.sin(i/beeps*Math.PI)*0.07, freqs[i%freqs.length]); }
function playFlipSound(n) { const profile = SOUND_PROFILES[soundIdx]; if (profile==='OFF') return; const ctx=getAudioCtx(); if(!ctx) return; if (ctx.state==='suspended') { ctx.resume(); return; } if (profile==='CLASSIC') playClassicSound(n); if (profile==='JADE') playJadeCrisp(n); if (profile==='DIGITAL') playDigitalSound(n); }

/* ════ KEYBOARD ════ */
document.addEventListener('keydown', e => {
  if (e.key==='ArrowRight'||e.key==='Enter'||e.key===' ') { e.preventDefault(); nextMsg(); }
  if (e.key==='ArrowLeft') { e.preventDefault(); prevMsg(); }
  if (e.key==='f'||e.key==='F') document.documentElement.requestFullscreen?.();
  if (e.key==='Escape') document.exitFullscreen?.();
  if (e.key==='m'||e.key==='M') dialNext();
});
window.addEventListener('click', () => { if (typeof enableSound==='function') { const sp = document.getElementById('sound-prompt'); if (sp) enableSound(sp); } }, { once: true });

/* ════ MODE DIAL ════ */
const DISPLAY_MODES = [
  { key: 'retro-dark',   label: 'Retro · Dark',   angle: -135 },
  { key: 'retro-light',  label: 'Retro · Light',  angle: -45  },
  { key: 'modern-dark',  label: 'Modern · Dark',  angle:  45  },
  { key: 'modern-light', label: 'Modern · Light', angle:  135 },
];
let dialModeIdx = 0, dialOpen = false;
(function() { const saved = localStorage.getItem('cw-display-mode') || 'retro-dark'; const idx = DISPLAY_MODES.findIndex(m => m.key === saved); dialModeIdx = idx >= 0 ? idx : 0; applyDisplayMode(dialModeIdx, false); })();
function buildDialPositions() {
  const wrap = document.getElementById('dialPositions'); if (!wrap) return; wrap.innerHTML = '';
  DISPLAY_MODES.forEach((m, i) => {
    if (i > 0) { const div = document.createElement('div'); div.className = 'dial-divider'; wrap.appendChild(div); }
    const pos = document.createElement('div'); pos.className = 'dial-pos'; pos.onclick = (e) => { e.stopPropagation(); setDialMode(i); };
    const dot = document.createElement('div'); dot.className = 'dial-pos-dot' + (i === dialModeIdx ? ' active' : ''); dot.id = 'dpos-' + i;
    const lbl = document.createElement('div'); lbl.className = 'dial-pos-label' + (i === dialModeIdx ? ' active' : ''); lbl.id = 'dlbl-' + i; lbl.textContent = m.label.split(' · ')[1];
    pos.appendChild(dot); pos.appendChild(lbl); wrap.appendChild(pos);
  });
}
function applyDisplayMode(idx, animate) {
  const mode = DISPLAY_MODES[idx]; document.documentElement.setAttribute('data-theme', mode.key); localStorage.setItem('cw-display-mode', mode.key); localStorage.setItem('cw-theme', mode.key);
  const needle = document.getElementById('dialNeedle'), name = document.getElementById('dialModeName');
  if (needle) { if (animate === false) { needle.style.transition = 'none'; needle.style.transform = `translateX(-50%) rotate(${mode.angle}deg)`; setTimeout(() => { needle.style.transition = ''; }, 50); } else { needle.style.transform = `translateX(-50%) rotate(${mode.angle}deg)`; } }
  if (name) name.textContent = mode.label;
  DISPLAY_MODES.forEach((_, i) => { const dot = document.getElementById('dpos-' + i); const lbl = document.getElementById('dlbl-' + i); if (dot) dot.className = 'dial-pos-dot' + (i === idx ? ' active' : ''); if (lbl) lbl.className = 'dial-pos-label' + (i === idx ? ' active' : ''); });
}
function setDialMode(idx) { dialModeIdx = idx; applyDisplayMode(idx, true); prevLines = Array.from({length: ROWS}, () => '\x00'.repeat(COLS)); if (messages.length) showMessage(currentIdx); }
function dialNext() { setDialMode((dialModeIdx + 1) % DISPLAY_MODES.length); }
function toggleDial() { dialOpen = !dialOpen; const panel = document.getElementById('dial-panel'); if (panel) panel.classList.toggle('open', dialOpen); }
document.addEventListener('click', e => { if (dialOpen && !e.target.closest('#dial-panel') && !e.target.closest('#dial-trigger') && !e.target.closest('#dial-hint')) { dialOpen = false; const panel = document.getElementById('dial-panel'); if (panel) panel.classList.remove('open'); } });

/* ════ INIT ════ */
(async () => {
  buildBoard(); updateClock();
  setInterval(updateClock, 10000);
  setInterval(updatePeriodTimer, 1000);
  setInterval(updatePassStatusPill, 30000);
  updatePeriodTimer(); updateSoundBtn(); buildDialPositions();
  setTimeout(() => { const sp = document.getElementById('sound-prompt'); if (sp) { sp.style.opacity='0'; setTimeout(()=>sp.remove(),600); } }, 8000);
  setSyncStatus('','CONNECTING...');
  const data = await cwFetchScreens();
  if (data) {
    await startBoard(data);
  } else {
    setSyncStatus('error','CONNECTION UNAVAILABLE');
    messages = [{ lines: ['COWBOY WIRE', CLASSROOM_CONFIG.badge, '', 'CONNECTING...', '', 'PLEASE WAIT', 'RIVERDALE HIGH SCHOOL'], speed: 10 }];
    buildDots(); showMessage(0);
    setTimeout(async () => { const retry = await cwFetchScreens(); if (retry) startBoard(retry); }, 15000);
  }
  setTimeout(initHonorRoll, 2000);
  setInterval(initHonorRoll, 30 * 60 * 1000);
})();
</script>
