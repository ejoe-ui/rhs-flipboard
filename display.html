<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<meta name="viewport" content="width=1920">
<title>Cowboy Wire · Riverdale High School</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --green:      #006938;
    --green-dark: #004d28;
    --green-dim:  #003d20;
    --tan:        #C4BEB5;
    --tile-bg:    #1a1a1a;
    --tile-border:#2c2c2c;
    --tile-text:  #f0ebe0;
    --board-bg:   #0d0d0d;
    --header-bg:  #0a0a0a;
    --flip-mid:   #006938;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--board-bg);
    overflow: hidden;
    font-family: 'Courier New', Courier, monospace;
  }

  /* scanline overlay */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 3px,
      rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* ══ HEADER ══ */
  #header {
    position: relative;
    width: 100%; height: 10vh;
    min-height: 56px; max-height: 80px;
    background: var(--header-bg);
    border-bottom: 3px solid var(--green);
    display: flex; align-items: center;
    padding: 0 1.5vw; gap: 1.5vw;
    z-index: 10; overflow: hidden;
  }

  .h-badge {
    background: var(--green); color: #fff;
    font-size: clamp(10px,1vw,16px); font-weight: 900;
    letter-spacing: 0.15em; padding: 5px 14px;
    border-radius: 3px; text-transform: uppercase;
    white-space: nowrap; flex-shrink: 0;
  }

  .h-divider {
    flex: 1; min-width: 8px; height: 1px;
    background: linear-gradient(90deg,rgba(196,190,181,0.25),rgba(196,190,181,0.05));
  }

  .h-school {
    color: var(--tan);
    font-size: clamp(10px,1.1vw,18px);
    letter-spacing: 0.2em; text-transform: uppercase;
    white-space: nowrap; flex-shrink: 1;
    overflow: hidden; text-overflow: ellipsis; min-width: 0;
  }

  .h-sync { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

  .sync-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #333; transition: background 0.4s; flex-shrink: 0;
  }
  .sync-dot.live  { background: var(--green); animation: blink 2.5s infinite; }
  .sync-dot.error { background: #882222; }

  .sync-label {
    color: #555; font-size: clamp(8px,0.65vw,11px);
    letter-spacing: 0.12em; text-transform: uppercase; white-space: nowrap;
  }

  .h-period-timer {
    display: flex; flex-direction: column;
    align-items: flex-end; flex-shrink: 0; gap: 2px;
  }
  .h-period-label {
    font-size: clamp(8px,0.7vw,12px); letter-spacing: 0.15em;
    color: var(--green); text-transform: uppercase;
    white-space: nowrap; font-weight: 700;
  }
  .h-period-time {
    font-size: clamp(10px,0.9vw,15px); letter-spacing: 0.1em;
    color: var(--tan); white-space: nowrap; font-weight: 700;
  }
  .h-period-time.warning { color: #ff9900; }
  .h-period-time.ending  { color: #cc4444; animation: blink 1s infinite; }

  .h-clock {
    color: #f0ebe0;
    font-size: clamp(18px,2.2vw,38px);
    font-weight: 700; letter-spacing: 0.08em;
    white-space: nowrap; flex-shrink: 0; text-align: right;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

  /* ══ BOARD ══ */
  #board-wrap {
    width: 100%;
    height: calc(100vh - 10vh - 3px);
    display: flex; flex-direction: column;
    padding: 1.2vh 1.5vw; gap: 0.5vh;
  }

  .tile-row {
    flex: 1; display: flex;
    gap: 0.3vw; align-items: stretch;
  }

  .tile {
    flex: 1;
    background: var(--tile-bg);
    border: 1px solid var(--tile-border);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }

  /* center split line */
  .tile::after {
    content: ''; position: absolute;
    left: 4%; right: 4%; top: 50%; height: 1px;
    background: rgba(0,0,0,0.55);
    transform: translateY(-50%); z-index: 2;
  }

  .tile-char {
    font-size: clamp(24px,6.4vh,112px);
    font-weight: 900; color: var(--tile-text);
    line-height: 1; letter-spacing: -0.02em;
    user-select: none; position: relative; z-index: 3;
    font-family: 'Courier New', Courier, monospace;
    transform: scaleX(0.78);
  }

  @keyframes flipDown {
    0%   { transform:scaleY(1);    background:var(--tile-bg); }
    25%  { transform:scaleY(0.3);  background:var(--flip-mid); }
    45%  { transform:scaleY(0.02); background:var(--flip-mid); }
    65%  { transform:scaleY(0.02); background:var(--flip-mid); }
    85%  { transform:scaleY(0.4);  background:var(--tile-bg); }
    100% { transform:scaleY(1);    background:var(--tile-bg); }
  }
  .tile.flipping { animation: flipDown 0.65s cubic-bezier(0.4,0,0.2,1) forwards; }
  .tile-row:nth-child(odd) .tile { border-color: #252525; }

  /* ══ BOTTOM ACCENT ══ */
  #bottom-accent {
    position: fixed; bottom: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg,
      var(--green-dark) 0%, var(--green) 30%,
      var(--tan) 50%,
      var(--green) 70%, var(--green-dark) 100%);
    z-index: 10;
  }

  /* ══ HONOR ROLL TICKER ══ */
  #honor-ticker-wrap {
    position: fixed; bottom: 4px; left: 0; right: 0; height: 28px;
    background: rgba(0,0,0,0.82);
    border-top: 1px solid var(--green-dim);
    z-index: 9; overflow: hidden;
    display: none; align-items: center;
  }
  #honor-ticker-label {
    background: var(--green); color: #fff;
    font-size: 10px; font-weight: 900;
    letter-spacing: 0.18em; text-transform: uppercase;
    padding: 0 12px; height: 100%;
    display: flex; align-items: center;
    white-space: nowrap; flex-shrink: 0; z-index: 2;
  }
  #honor-ticker-track { flex:1; overflow:hidden; position:relative; height:100%; }
  #honor-ticker-inner {
    display: inline-flex; align-items: center; height: 100%;
    white-space: nowrap;
    animation: tickerScroll 400s linear infinite;
    will-change: transform;
  }
  @keyframes tickerScroll { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
  .ticker-name  { font-size:11px; font-weight:700; color:var(--tan); letter-spacing:0.1em; text-transform:uppercase; padding:0 6px; }
  .ticker-sep   { color:var(--green); font-size:10px; padding:0 4px; opacity:0.7; }
  .ticker-grade { font-size:9px; color:#555; letter-spacing:0.12em; text-transform:uppercase; padding:0 2px 0 0; }

  /* ══ INDICATOR DOTS ══ */
  #indicator-bar {
    position: fixed; bottom: 8px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 7px; align-items: center; z-index: 50;
  }
  .ind-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #2a2a2a; transition: background 0.3s;
  }
  .ind-dot.active { background: var(--green); }

  /* ══ SOUND TOGGLE ══ */
  #soundToggleBtn {
    position: fixed; bottom: 44px; right: 20px;
    background: #111; border: 1px solid #333; color: #555;
    font-family: 'Courier New', monospace;
    font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    padding: 5px 12px; border-radius: 3px; cursor: pointer;
    z-index: 51; transition: all 0.2s; opacity: 0.8;
  }
  #soundToggleBtn:hover { opacity: 1; }

  /* ══ SOUND PROMPT ══ */
  #sound-prompt {
    position: fixed; bottom: 20px; left: 50%;
    transform: translateX(-50%);
    background: rgba(0,105,56,0.85); color: #fff;
    font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
    padding: 7px 18px; border-radius: 4px;
    cursor: pointer; z-index: 200; transition: opacity 0.5s;
  }
</style>
</head>
<body>

<!-- ══ HEADER ══ -->
<div id="header">
  <div class="h-badge" id="roomBadge">RHS · ROOM 27</div>
  <div class="h-divider"></div>
  <div class="h-school">COWBOY WIRE · RIVERDALE PONY EXPRESS</div>
  <div class="h-divider"></div>
  <div class="h-sync">
    <div class="sync-dot" id="syncDot"></div>
    <span class="sync-label" id="syncLabel">Starting...</span>
  </div>
  <div class="h-divider" style="max-width:2vw"></div>
  <div class="h-period-timer" id="periodTimer" style="display:none">
    <div class="h-period-label" id="periodLabel"></div>
    <div class="h-period-time"  id="periodTime"></div>
  </div>
  <div class="h-divider" style="max-width:1vw"></div>
  <div class="h-clock" id="clock">--:-- --</div>
</div>

<!-- ══ BOARD ══ -->
<div id="board-wrap"></div>

<!-- ══ HONOR ROLL TICKER ══ -->
<div id="honor-ticker-wrap">
  <div id="honor-ticker-label">&#127891; Honor Roll</div>
  <div id="honor-ticker-track">
    <div id="honor-ticker-inner"></div>
  </div>
</div>

<!-- ══ BOTTOM ACCENT ══ -->
<div id="bottom-accent"></div>

<!-- ══ INDICATOR DOTS ══ -->
<div id="indicator-bar"></div>

<!-- ══ SOUND PROMPT ══ -->
<div id="sound-prompt" onclick="enableSound(this)">▶ Click to enable flip sound</div>

<!-- ══ SOUND TOGGLE ══ -->
<button id="soundToggleBtn" onclick="cycleSoundProfile()">🔊 CLASSIC</button>

<!-- ══ SCRIPTS ══ -->
<script src="config.js"></script>
<script src="cowboy-wire-core.js"></script>
<script>
/* ════════════════════════════════════════════════════════
   DISPLAY.HTML — TV Flipboard Shell
   All content logic lives in cowboy-wire-core.js.
   This file handles: board rendering, tile animation,
   rotation, sound, keyboard nav, and sync loop.
════════════════════════════════════════════════════════ */

const ROWS         = CLASSROOM_CONFIG.display.rows;
const COLS         = CLASSROOM_CONFIG.display.cols;
const SYNC_SEC     = CLASSROOM_CONFIG.display.syncInterval;
const SCRAMBLE_MS  = CLASSROOM_CONFIG.display.scrambleMs;
const SCRAMBLE_STP = CLASSROOM_CONFIG.display.scrambleSteps;
const CHARS        = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789 .,!?:-/\'#@&%+';

/* ── Apply config identity ── */
document.getElementById('roomBadge').textContent = CLASSROOM_CONFIG.badge;
document.title = 'Cowboy Wire · ' + CLASSROOM_CONFIG.badge;

/* ── State ── */
let messages    = [];
let currentIdx  = 0;
let tiles       = [];
let prevLines   = Array.from({length: ROWS}, () => ' '.repeat(COLS));
let rotateTimer = null;
let syncTimer   = null;
let calTimer    = null;

/* ════════════════════════════════════════════════════════
   BOARD CONSTRUCTION
════════════════════════════════════════════════════════ */
function buildBoard() {
  const wrap = document.getElementById('board-wrap');
  wrap.innerHTML = '';
  tiles = [];
  for (let r = 0; r < ROWS; r++) {
    const rowEl = document.createElement('div');
    rowEl.className = 'tile-row';
    const rowTiles = [];
    for (let c = 0; c < COLS; c++) {
      const tileEl = document.createElement('div');
      tileEl.className = 'tile';
      const charEl = document.createElement('span');
      charEl.className = 'tile-char';
      charEl.textContent = '';
      tileEl.appendChild(charEl);
      rowEl.appendChild(tileEl);
      rowTiles.push({ el: tileEl, charEl });
    }
    wrap.appendChild(rowEl);
    tiles.push(rowTiles);
  }
}

/* ════════════════════════════════════════════════════════
   TEXT FORMATTING
════════════════════════════════════════════════════════ */
function padCenter(text, cols) {
  text = (text || '').toUpperCase().substring(0, cols);
  const total = cols - text.length;
  const left  = Math.floor(total / 2);
  return ' '.repeat(left) + text + ' '.repeat(total - left);
}

/* ════════════════════════════════════════════════════════
   TILE ANIMATION
════════════════════════════════════════════════════════ */
function animateTile(tile, finalChar, delay) {
  return new Promise(resolve => {
    setTimeout(() => {
      let step = 0;
      const iv = setInterval(() => {
        const rnd = CHARS[Math.floor(Math.random() * CHARS.length)];
        tile.charEl.textContent = rnd;
        tile.el.style.background = step % 2 === 0 ? '#0f2a1a' : '#162c1e';
        tile.charEl.style.color  = step % 2 === 0 ? '#00cc66' : '#C4BEB5';
        step++;
        if (step >= SCRAMBLE_STP) {
          clearInterval(iv);
          const ch = (finalChar || ' ').trim();
          tile.charEl.textContent = ch;
          tile.charEl.style.color = 'var(--tile-text)';
          tile.el.style.background = 'var(--tile-bg)';
          tile.el.classList.add('flipping');
          tile.el.addEventListener('animationend', () => {
            tile.el.classList.remove('flipping');
            resolve();
          }, { once: true });
        }
      }, SCRAMBLE_MS);
    }, delay);
  });
}

/* ════════════════════════════════════════════════════════
   SHOW MESSAGE
════════════════════════════════════════════════════════ */
function showMessage(idx) {
  if (!messages.length) return;
  idx = ((idx % messages.length) + messages.length) % messages.length;
  currentIdx = idx;

  const msg      = messages[idx];
  const newLines = Array.from({length: ROWS}, (_, r) =>
    padCenter(msg.lines[r] || '', COLS)
  );

  updateDots();

  let changedTiles = 0;
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (newLines[r][c] !== prevLines[r][c]) changedTiles++;

  if (changedTiles > 0) playFlipSound(changedTiles);

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (newLines[r][c] !== prevLines[r][c]) {
        animateTile(tiles[r][c], newLines[r][c], Math.random() * 1200);
      }
    }
  }

  prevLines = newLines;
  scheduleNext(msg.speed || 8);
}

/* ════════════════════════════════════════════════════════
   ROTATION
════════════════════════════════════════════════════════ */
function scheduleNext(speedSec) {
  clearTimeout(rotateTimer);
  if (messages.length > 1) {
    rotateTimer = setTimeout(() => showMessage(currentIdx + 1), (speedSec || 8) * 1000);
  }
}

function nextMsg() { clearTimeout(rotateTimer); showMessage(currentIdx + 1); }
function prevMsg() { clearTimeout(rotateTimer); showMessage(currentIdx - 1); }

/* ════════════════════════════════════════════════════════
   INDICATOR DOTS
════════════════════════════════════════════════════════ */
function buildDots() {
  const bar   = document.getElementById('indicator-bar');
  bar.innerHTML = '';
  const count = Math.min(messages.length, 16);
  for (let i = 0; i < count; i++) {
    const d = document.createElement('div');
    d.className = 'ind-dot';
    bar.appendChild(d);
  }
  if (messages.length > 16) {
    const s = document.createElement('span');
    s.style.cssText = 'color:#333;font-size:10px;letter-spacing:0.1em';
    s.textContent = '+' + (messages.length - 16);
    bar.appendChild(s);
  }
  updateDots();
}

function updateDots() {
  document.querySelectorAll('.ind-dot').forEach((d, i) => {
    d.className = 'ind-dot' + (i === currentIdx ? ' active' : '');
  });
}

/* ════════════════════════════════════════════════════════
   CLOCK
════════════════════════════════════════════════════════ */
function updateClock() {
  const now = new Date();
  let h = now.getHours();
  const m  = now.getMinutes().toString().padStart(2,'0');
  const ap = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  document.getElementById('clock').textContent = `${h}:${m} ${ap}`;
}

/* ════════════════════════════════════════════════════════
   PERIOD TIMER (header)
════════════════════════════════════════════════════════ */
function updatePeriodTimer() {
  const wrap  = document.getElementById('periodTimer');
  const label = document.getElementById('periodLabel');
  const time  = document.getElementById('periodTime');
  if (!wrap || !label || !time) return;

  const data = cwBuildPeriodTimerData(window._cwCalEvents || []);
  if (!data) { wrap.style.display = 'none'; return; }

  if (data.inPeriod) {
    label.textContent = data.label;
    time.textContent  = data.timeStr + ' LEFT';
    time.className    = 'h-period-time ' + (data.status !== 'normal' ? data.status : '');
  } else {
    label.textContent = data.label;
    time.textContent  = 'IN ' + data.minsAway + ' MIN';
    time.className    = 'h-period-time';
  }
  wrap.style.display = 'flex';
}

/* ════════════════════════════════════════════════════════
   SYNC STATUS
════════════════════════════════════════════════════════ */
function setSyncStatus(state, label) {
  const dot = document.getElementById('syncDot');
  dot.className = 'sync-dot' + (state === 'live' ? ' live' : state === 'error' ? ' error' : '');
  document.getElementById('syncLabel').textContent = label;
}

/* ════════════════════════════════════════════════════════
   GOOGLE SHEET CSV PARSER
   Reads Screen / Line / Text / Speed columns.
   Special first-line tokens map to live slots:
   [CALENDAR] [SCHEDULE] [BIRTHDAY] [COUNTDOWN]
   [QUICKMSG] [FACTS] [PASSABLE] [WEATHER]
   [CODE] [MENU]
════════════════════════════════════════════════════════ */
const SLOT_TOKENS = {
  '[CALENDAR]':  { _isCalendarPlaceholder:  true, speed: 15 },
  '[SCHEDULE]':  { _isSchedulePlaceholder:  true, speed: 15 },
  '[BIRTHDAY]':  { _isBirthdayPlaceholder:  true, speed: 12 },
  '[COUNTDOWN]': { _isCountdownPlaceholder: true, speed: 15 },
  '[QUICKMSG]':  { _isQuickMsgPlaceholder:  true, speed: 15 },
  '[FACTS]':     { _isFactsPlaceholder:     true, speed: 18 },
  '[PASSABLE]':  { _isPassablePlaceholder:  true, speed: 20 },
  '[WEATHER]':   { _isWeatherPlaceholder:   true, speed: 18 },
  '[CODE]':      { _isCodePlaceholder:      true, speed: 10 },
  '[MENU]':      { _isMenuPlaceholder:      true, speed: 15 },
};

function parseCSV(csv) {
  const rows = csv.trim().split('\n').filter(r => r.trim());
  if (rows.length < 2) return null;

  const header = rows[0].toLowerCase().replace(/\r/g,'').split(',')
    .map(h => h.replace(/^"|"$/g,'').trim());
  const sIdx = header.findIndex(h => h === 'screen');
  const tIdx = header.findIndex(h => h === 'text');
  const spIdx= header.findIndex(h => h === 'speed');
  if (sIdx < 0 || tIdx < 0) return null;

  const screens = {};
  for (let i = 1; i < rows.length; i++) {
    const cols  = rows[i].replace(/\r/g,'').split(',');
    const clean = c => c >= 0 ? (cols[c]||'').replace(/^"|"$/g,'').trim() : '';
    const scr   = clean(sIdx);
    const text  = clean(tIdx).toUpperCase();
    const sp    = spIdx >= 0 ? parseFloat(clean(spIdx)) || null : null;
    if (!scr) continue;
    if (!screens[scr]) screens[scr] = { lines: [], speed: 8 };
    screens[scr].lines.push(text);
    if (sp) screens[scr].speed = sp;
  }

  return Object.values(screens).map(s => {
    const first = s.lines.find(l => l.trim()) || '';
    if (SLOT_TOKENS[first]) {
      return { lines: Array(7).fill(''), speed: s.speed || SLOT_TOKENS[first].speed, ...SLOT_TOKENS[first] };
    }
    return s;
  }).filter(s => {
    const isSlot = Object.values(SLOT_TOKENS).some(t => Object.keys(t).some(k => s[k]));
    return isSlot || s.lines[0];
  }) || null;
}

/* ════════════════════════════════════════════════════════
   SHEET FETCH  (direct → gviz fallback)
════════════════════════════════════════════════════════ */
async function fetchSheet(url) {
  try {
    const res = await fetch(url, { cache: 'no-store', mode: 'cors' });
    if (res.ok) {
      const parsed = parseCSV(await res.text());
      if (parsed) return parsed;
    }
  } catch(e) {}

  // gviz fallback — no proxy needed, works on school networks
  return new Promise(resolve => {
    const id      = (url.match(/spreadsheets\/d\/([a-zA-Z0-9_-]+)/) || [])[1];
    const gid     = (url.match(/gid=(\d+)/) || ['','0'])[1];
    if (!id) { resolve(null); return; }

    const cb   = '_gviz_' + Date.now();
    const src  = document.createElement('script');
    let done   = false;
    const finish = (val) => {
      if (done) return; done = true;
      clearTimeout(timer);
      delete window[cb];
      src.remove();
      resolve(val);
    };
    const timer = setTimeout(() => finish(null), 8000);

    window[cb] = (data) => {
      try { finish(parseGviz(data)); } catch(e) { finish(null); }
    };
    src.src = `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json&tq=select+*&gid=${gid}&cb=${cb}`;
    src.onerror = () => finish(null);
    document.head.appendChild(src);
  });
}

function parseGviz(data) {
  if (!data?.table) return null;
  const cols = data.table.cols || [];
  const rows = data.table.rows || [];
  const hdr  = cols.map(c => (c.label||'').toLowerCase().trim());
  const sIdx = hdr.findIndex(h => h === 'screen');
  const tIdx = hdr.findIndex(h => h === 'text');
  const spIdx= hdr.findIndex(h => h === 'speed');
  if (sIdx < 0 || tIdx < 0) return null;

  const screens = {};
  for (const row of rows) {
    const c   = row.c || [];
    const val = i => i >= 0 && c[i]?.v != null ? String(c[i].v).trim() : '';
    const scr = val(sIdx);
    const txt = val(tIdx).toUpperCase();
    const sp  = spIdx >= 0 ? parseFloat(val(spIdx)) || null : null;
    if (!scr) continue;
    if (!screens[scr]) screens[scr] = { lines:[], speed:8 };
    screens[scr].lines.push(txt);
    if (sp) screens[scr].speed = sp;
  }

  return Object.values(screens).map(s => {
    const first = s.lines.find(l => l.trim()) || '';
    if (SLOT_TOKENS[first]) {
      return { lines: Array(7).fill(''), speed: s.speed || SLOT_TOKENS[first].speed, ...SLOT_TOKENS[first] };
    }
    return s;
  }).filter(s => {
    const isSlot = Object.values(SLOT_TOKENS).some(t => Object.keys(t).some(k => s[k]));
    return isSlot || s.lines[0];
  }) || null;
}

/* ════════════════════════════════════════════════════════
   SMART MERGE
   Re-sync sheet data without losing live slot content
════════════════════════════════════════════════════════ */
function smartMerge(fresh) {
  return fresh.map(item => {
    for (const [key, flags] of Object.entries(CW_SLOT_MAP)) {
      if (item[flags.ph]) {
        const existing = messages.find(m => m[flags.ph] || m[flags.sl]);
        return existing || item;
      }
    }
    return item;
  });
}

/* ════════════════════════════════════════════════════════
   START BOARD
════════════════════════════════════════════════════════ */
async function startBoard(data) {
  messages  = data;
  prevLines = Array.from({length: ROWS}, () => '\x00'.repeat(COLS));
  buildDots();
  setSyncStatus('', 'LOADING...');

  // Inject all live slots, then show first message
  await cwRefreshAllSlots(messages, buildDots);

  showMessage(0);
  setSyncStatus('live', 'LIVE · SYNCS EVERY ' + SYNC_SEC + 'S');

  // Sync loop
  clearInterval(syncTimer);
  syncTimer = setInterval(async () => {
    const fresh = await fetchSheet(CLASSROOM_CONFIG.sheetUrl);
    if (fresh) {
      const savedLine = messages[currentIdx]?.lines?.[0] || '';
      messages = smartMerge(fresh);
      const ni = messages.findIndex(m => m.lines?.[0] === savedLine);
      if (ni >= 0) currentIdx = ni;
      buildDots();
      await cwRefreshAllSlots(messages, buildDots);
      const t = new Date();
      let h = t.getHours() % 12 || 12;
      setSyncStatus('live', `SYNCED ${h}:${t.getMinutes().toString().padStart(2,'0')}`);
    } else {
      setSyncStatus('error', 'SYNC FAILED · RETRY SOON');
    }
  }, SYNC_SEC * 1000);

  // Calendar refresh every 5 min
  clearInterval(calTimer);
  calTimer = setInterval(async () => {
    const events = await cwFetchCalendar();
    if (cwFindSlotIdx(messages,'calendar') >= 0)
      cwInjectSlot(messages,'calendar', cwBuildCalendarScreen(events), buildDots);
    cwInjectSlot(messages,'schedule', cwBuildScheduleScreen(events), buildDots);
  }, 5 * 60 * 1000);
}

async function initHonorRoll() {

/* ════════════════════════════════════════════════════════
   SOUND ENGINE
════════════════════════════════════════════════════════ */
const SOUND_PROFILES = ['OFF','CLASSIC','CLACK','DIGITAL'];
let soundIdx  = 1;
let audioCtx  = null;

try {
  const saved = localStorage.getItem('cw-sound-profile');
  if (saved && SOUND_PROFILES.includes(saved)) soundIdx = SOUND_PROFILES.indexOf(saved);
} catch(e) {}

function getAudioCtx() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { return null; }
  }
  return audioCtx?.state === 'suspended' ? null : audioCtx;
}

function enableSound(el) {
  if (!audioCtx) try { audioCtx = new (window.AudioContext||window.webkitAudioContext)(); } catch(e) {}
  if (audioCtx?.state === 'suspended') audioCtx.resume();
  if (soundIdx === 0) { soundIdx = 1; updateSoundBtn(); }
  if (el) { el.style.opacity='0'; setTimeout(()=>el.remove(),600); }
  playFlipSound(5);
}

function cycleSoundProfile() {
  if (audioCtx?.state === 'suspended') audioCtx.resume();
  soundIdx = (soundIdx + 1) % SOUND_PROFILES.length;
  try { localStorage.setItem('cw-sound-profile', SOUND_PROFILES[soundIdx]); } catch(e) {}
  updateSoundBtn();
  if (SOUND_PROFILES[soundIdx] !== 'OFF') playFlipSound(6);
}

function updateSoundBtn() {
  const btn = document.getElementById('soundToggleBtn');
  if (!btn) return;
  const labels = { OFF:'🔇 OFF', CLASSIC:'🔊 CLASSIC', CLACK:'⌨️ CLACK', DIGITAL:'💾 DIGITAL' };
  btn.textContent = labels[SOUND_PROFILES[soundIdx]];
  btn.style.opacity = soundIdx === 0 ? '0.4' : '0.8';
  btn.style.borderColor = soundIdx === 0 ? '#333' : 'var(--green)';
  btn.style.color = soundIdx === 0 ? '#555' : 'var(--green)';
}

function playClassicClick(ctx, time, vol) {
  const buf  = ctx.createBuffer(1, Math.floor(ctx.sampleRate*0.09), ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i=0;i<data.length;i++) {
    const t = i/data.length;
    data[i] = ((Math.random()*2-1)*0.65 + Math.sin(2*Math.PI*160*i/ctx.sampleRate)*0.35) * Math.pow(1-t,2.8);
  }
  const src = ctx.createBufferSource(); src.buffer = buf;
  const f   = ctx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=800; f.Q.value=1.2;
  const g   = ctx.createGain(); g.gain.value = vol||0.18;
  src.connect(f); f.connect(g); g.connect(ctx.destination); src.start(time);
}
function playClassicSound(n) {
  const ctx=getAudioCtx(); if(!ctx)return;
  const now=ctx.currentTime, clicks=Math.min(Math.max(Math.floor(n*0.5),4),20);
  for(let i=0;i<clicks;i++) playClassicClick(ctx, now+(i/clicks)*2.8, 0.08+Math.sin(i/clicks*Math.PI)*0.14);
}

function playPop(ctx,time,vol) {
  const buf=ctx.createBuffer(1,Math.floor(ctx.sampleRate*0.04),ctx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,4);
  const src=ctx.createBufferSource(); src.buffer=buf;
  const bp=ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=700+Math.random()*300; bp.Q.value=0.8;
  const g=ctx.createGain(); g.gain.value=vol||0.25;
  src.connect(bp); bp.connect(g); g.connect(ctx.destination); src.start(time);
}
function playClackSound(n) {
  const ctx=getAudioCtx(); if(!ctx)return;
  const now=ctx.currentTime, total=2.8;
  const pops=Math.min(Math.max(Math.floor(n*0.6),6),28);
  const times=Array.from({length:pops},()=>{const u=Math.random(),v=Math.random();return 0.1+((u+v)/2)*0.8;}).sort((a,b)=>a-b);
  times.forEach(t=>{
    const d=Math.abs(t-0.55);
    playPop(ctx, now+Math.max(0,t*total+(Math.random()-0.5)*0.06), Math.max(0.08,0.15+(0.2-d*0.3)));
  });
}

function playDigitalBeep(ctx,time,vol,freq) {
  const osc=ctx.createOscillator(); const g=ctx.createGain();
  osc.type='square'; osc.frequency.value=freq||880;
  g.gain.setValueAtTime(0,time);
  g.gain.linearRampToValueAtTime(vol||0.12,time+0.004);
  g.gain.setValueAtTime(vol||0.12,time+0.028);
  g.gain.linearRampToValueAtTime(0,time+0.034);
  const f=ctx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=freq||880; f.Q.value=3;
  osc.connect(f); f.connect(g); g.connect(ctx.destination);
  osc.start(time); osc.stop(time+0.05);
}
function playDigitalSound(n) {
  const ctx=getAudioCtx(); if(!ctx)return;
  const now=ctx.currentTime, beeps=Math.min(Math.max(Math.floor(n*0.4),3),16);
  const freqs=[1100,990,880,770,990,1100,880,770];
  for(let i=0;i<beeps;i++) playDigitalBeep(ctx, now+(i/beeps)*2.8, 0.08+Math.sin(i/beeps*Math.PI)*0.07, freqs[i%freqs.length]);
}

function playFlipSound(n) {
  const profile = SOUND_PROFILES[soundIdx];
  if (profile==='OFF') return;
  const ctx=getAudioCtx(); if(!ctx) return;
  if (ctx.state==='suspended') { ctx.resume(); return; }
  if (profile==='CLASSIC') playClassicSound(n);
  if (profile==='CLACK')   playClackSound(n);
  if (profile==='DIGITAL') playDigitalSound(n);
}

   KEYBOARD NAV
════════════════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (e.key==='ArrowRight'||e.key==='Enter'||e.key===' ') { e.preventDefault(); nextMsg(); }
  if (e.key==='ArrowLeft') { e.preventDefault(); prevMsg(); }
  if (e.key==='f'||e.key==='F') document.documentElement.requestFullscreen?.();
  if (e.key==='Escape') document.exitFullscreen?.();
});

window.addEventListener('click', () => {
  if (typeof enableSound==='function') {
    const sp = document.getElementById('sound-prompt');
    if (sp) enableSound(sp);
  }
}, { once: true });

   INIT
════════════════════════════════════════════════════════ */
(async () => {
  buildBoard();
  updateClock();
  setInterval(updateClock, 10000);
  setInterval(updatePeriodTimer, 1000);
  updatePeriodTimer();
  updateSoundBtn();

  // Auto-dismiss sound prompt after 8s
  setTimeout(() => {
    const sp = document.getElementById('sound-prompt');
    if (sp) { sp.style.opacity='0'; setTimeout(()=>sp.remove(),600); }
  }, 8000);

  setSyncStatus('','CONNECTING...');

  const data = await fetchSheet(CLASSROOM_CONFIG.sheetUrl);
  if (data) {
    await startBoard(data);
  } else {
    // Sheet failed — show fallback message and retry
    setSyncStatus('error','SHEET UNAVAILABLE');
    messages = [{
      lines: [
        'COWBOY WIRE',
        CLASSROOM_CONFIG.badge,
        '',
        'CONNECTING TO SHEET...',
        '',
        'PLEASE WAIT',
        'RIVERDALE HIGH SCHOOL',
      ],
      speed: 10,
    }];
    buildDots();
    showMessage(0);
    // Retry after 15s
    setTimeout(async () => {
      const retry = await fetchSheet(CLASSROOM_CONFIG.sheetUrl);
      if (retry) startBoard(retry);
    }, 15000);
  }

  // Honor roll loads 2s after board is ready
  setTimeout(initHonorRoll, 2000);
  setInterval(initHonorRoll, 30 * 60 * 1000);
})();
