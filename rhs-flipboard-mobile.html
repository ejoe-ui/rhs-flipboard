/* ════ HELPERS ════ */
function localDateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function timeToMins(t) {
  const [h,m] = t.split(':').map(Number);
  return h*60+m;
}

function nowMins() {
  const n = new Date();
  return n.getHours()*60 + n.getMinutes();
}

function fmtTime12(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr);
  let h = d.getHours(), m = d.getMinutes();
  const ap = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return m > 0 ? `${h}:${String(m).padStart(2,'0')} ${ap}` : `${h}:00 ${ap}`;
}

function daysUntil(dateStr) {
  const now = new Date();
  const target = new Date(dateStr + 'T00:00:00');
  const diff = target - new Date(now.getFullYear(), now.getMonth(), now.getDate());
  return Math.ceil(diff / 86400000);
}

function detectSchedule(calEvents) {
  const now = new Date();
  const dow = now.getDay();
  const dateStr = localDateStr(now);
  if (dow === 0 || dow === 6 || NO_SCHOOL.has(dateStr)) return null;
  if (calEvents) {
    for (const e of calEvents) {
      const t = (e.title||'').toLowerCase();
      if (t.includes('foggy') || t.includes('late arrival')) return 'FOGGY';
      if (t.includes('minimum')) return 'MINIMUM';
      if (t.includes('early release')) return 'EARLY_RELEASE';
      if (t.includes('block')) return dow === 4 ? 'BLOCK_THU' : 'BLOCK_WED';
    }
  }
  if (dow === 1) return 'EARLY_RELEASE';
  if (dow === 3) return 'BLOCK_WED';
  if (dow === 4) return 'BLOCK_THU';
  return 'REGULAR';
}

function updateClock() {
  const now = new Date();
  let h = now.getHours();
  const m = now.getMinutes().toString().padStart(2,'0');
  const ap = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  document.getElementById('clock').textContent = `${h}:${m} ${ap}`;
}

function setSyncStatus(state, label) {
  const dot = document.getElementById('syncDot');
  dot.className = 'sync-dot' + (state === 'live' ? ' live' : state === 'error' ? ' error' : '');
  document.getElementById('syncLabel').textContent = label;
}

/* ════ RENDER ════ */
function render(calEvents, quickMsg) {
  const now      = new Date();
  const nm       = nowMins();
  const monNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const schedKey = detectSchedule(calEvents);
  const schedule = schedKey ? SCHEDULES[schedKey] : null;

  const sections = [];

  /* ── SCHEDULE ── */
  const schedCard = document.createElement('div');
  schedCard.className = 'card';
  if (!schedule) {
    const next = getNextSchoolDay();
    schedCard.innerHTML = `
      <div class="card-header">
        <span class="card-label green">Bell Schedule</span>
        <span class="card-tag">Today</span>
      </div>
      <div class="card-body">
        <div class="no-school">No School Today</div>
        ${next ? `<div class="next-day">Next school day: ${next.label} · ${next.schedLabel}</div>` : ''}
      </div>`;
  } else {
    const periods = schedule.periods;
    let rows = '';
    for (const p of periods) {
      const start = timeToMins(p.start);
      const end   = timeToMins(p.end);
      const isNow = nm >= start && nm < end;
      const isPast = nm >= end;
      if (p.break) {
        rows += `<div class="break-row${isPast ? ' past' : ''}">
          <span class="break-name">${p.name}</span>
          <span class="break-time">${p.start} – ${p.end}</span>
          ${isNow ? '<span class="now-badge">NOW</span>' : ''}
        </div>`;
      } else {
        rows += `<div class="period-row${isNow ? ' now' : isPast ? ' past' : ''}">
          <span class="period-name">${p.name}</span>
          <span class="period-time">${p.start} – ${p.end}</span>
          ${isNow ? '<span class="now-badge">NOW</span>' : ''}
        </div>`;
      }
    }
    schedCard.innerHTML = `
      <div class="card-header">
        <span class="card-label green">Bell Schedule</span>
        <span class="card-tag">${schedule.label}</span>
      </div>
      <div class="card-body">${rows}</div>`;
  }
  sections.push(schedCard);

  /* ── CALENDAR ── */
  const calCard = document.createElement('div');
  calCard.className = 'card';
  const todayEvts = (calEvents || []).filter(e => {
    const d = new Date(e.start);
    return d.toDateString() === now.toDateString();
  }).sort((a,b) => new Date(a.start) - new Date(b.start));
  const upcomingEvts = (calEvents || []).filter(e => {
    const d = new Date(e.start);
    return d.toDateString() !== now.toDateString() && d > now;
  }).slice(0,3);

  let calContent = '';
  if (todayEvts.length) {
    calContent = todayEvts.map(e => `
      <div class="event-row">
        <span class="event-time">${e.allDay ? 'All Day' : fmtTime12(e.start)}</span>
        <span class="event-title">${e.title}</span>
      </div>`).join('');
  } else if (upcomingEvts.length) {
    calContent = upcomingEvts.map(e => {
      const d = new Date(e.start);
      return `<div class="event-row">
        <span class="event-time">${monNames[d.getMonth()]} ${d.getDate()}</span>
        <span class="event-title">${e.title}</span>
      </div>`;
    }).join('');
  } else {
    calContent = '<div class="no-events">No events today</div>';
  }
  calCard.innerHTML = `
    <div class="card-header">
      <span class="card-label">RHS Events</span>
      <span class="card-tag">${todayEvts.length ? 'Today' : 'Upcoming'}</span>
    </div>
    <div class="card-body">${calContent}</div>`;
  sections.push(calCard);

  /* ── COUNTDOWNS ── */
  const upcoming = COUNTDOWNS
    .map(c => ({ ...c, days: daysUntil(c.date) }))
    .filter(c => c.days >= 0 && c.days <= 120)
    .sort((a,b) => a.days - b.days)
    .slice(0,5);

  if (upcoming.length) {
    const cdCard = document.createElement('div');
    cdCard.className = 'card';
    const cdRows = upcoming.map(c => {
      const cls = c.days === 0 ? 'today' : c.days <= 7 ? 'soon' : '';
      const label = c.days === 0 ? 'TODAY' : c.days === 1 ? '1 DAY' : `${c.days} DAYS`;
      return `<div class="countdown-row">
        <span class="countdown-label">${c.label}</span>
        <span class="countdown-days ${cls}">${label}</span>
      </div>`;
    }).join('');
    cdCard.innerHTML = `
      <div class="card-header">
        <span class="card-label">Countdowns</span>
      </div>
      <div class="card-body">${cdRows}</div>`;
    sections.push(cdCard);
  }

  /* ── BIRTHDAYS ── */
  const today = { m: now.getMonth()+1, d: now.getDate() };
  const dow = now.getDay();
  const monday = new Date(now);
  monday.setDate(now.getDate() - (dow === 0 ? 6 : dow-1));
  const weekDates = Array.from({length:7},(_,i)=>{
    const d = new Date(monday); d.setDate(monday.getDate()+i);
    return {m:d.getMonth()+1, d:d.getDate()};
  });
  const todayBdays = BIRTHDAYS.filter(b => b.month===today.m && b.day===today.d);
  const weekBdays  = BIRTHDAYS.filter(b => weekDates.some(w=>w.m===b.month&&w.d===b.day) && !(b.month===today.m&&b.day===today.d));

  if (todayBdays.length || weekBdays.length) {
    const bdCard = document.createElement('div');
    bdCard.className = 'card';
    let bdContent = '';
    if (todayBdays.length) {
      bdContent += `<div class="bday-today">${todayBdays.map(b=>`🎂 ${b.name}`).join('<br>')}</div>`;
    }
    if (weekBdays.length) {
      bdContent += `<div class="bday-week">${weekBdays.slice(0,4).map(b=>`${monNames[b.month-1]} ${b.day} · ${b.name}`).join('<br>')}</div>`;
    }
    bdCard.innerHTML = `
      <div class="card-header">
        <span class="card-label">${todayBdays.length ? '🎂 Happy Birthday!' : 'Birthdays This Week'}</span>
      </div>
      <div class="card-body">${bdContent}</div>`;
    sections.push(bdCard);
  }

  /* ── QUICK MESSAGE ── */
  if (quickMsg && quickMsg.line1) {
    const sender = quickMsg.sender && quickMsg.sender !== 'ANONYMOUS' ? quickMsg.sender : 'Room 27';
    const posted = new Date(quickMsg.timestamp);
    const timeStr = posted.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    const lines = [quickMsg.line1, quickMsg.line2, quickMsg.line3].filter(l=>l&&l.trim());
    const qmCard = document.createElement('div');
    qmCard.className = 'card';
    qmCard.innerHTML = `
      <div class="card-header">
        <span class="card-label">Board Message</span>
        <span class="card-tag">${timeStr}</span>
      </div>
      <div class="card-body">
        <div class="msg-from">From ${sender}</div>
        <div class="msg-text">${lines.join('<br>')}</div>
      </div>`;
    sections.push(qmCard);
  }

  /* ── DID YOU KNOW ── */
  const dayOfYear = Math.floor((now - new Date(now.getFullYear(),0,0))/86400000);
  const fact = FACT_BANK[dayOfYear % FACT_BANK.length];
  const factCard = document.createElement('div');
  factCard.className = 'card';
  factCard.innerHTML = `
    <div class="card-header">
      <span class="card-label tan">Did You Know?</span>
    </div>
    <div class="card-body">
      <div class="fact-text">${fact}</div>
    </div>`;
  sections.push(factCard);

  /* ── RENDER ── */
  const content = document.getElementById('content');
  content.innerHTML = '';
  sections.forEach(s => content.appendChild(s));
}

function getNextSchoolDay() {
  const monNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const now = new Date();
  for (let i=1;i<=7;i++) {
    const d = new Date(now);
    d.setDate(now.getDate()+i);
    const dow = d.getDay();
    const ds = localDateStr(d);
    if (dow===0||dow===6||NO_SCHOOL.has(ds)) continue;
    const schedLabels = {1:'Early Release',3:'Block 1-3-5-7',4:'Block 2-4-6-7',2:'Regular',5:'Regular'};
    return { label: `${dayNames[dow]} ${monNames[d.getMonth()]} ${d.getDate()}`, schedLabel: schedLabels[dow]||'Regular' };
  }
  return null;
}

/* ════ DATA FETCH ════ */
async function loadData() {
  setSyncStatus('', 'Loading...');
  try {
    // Fetch calendar + quick message in parallel
    const [calRes, qmRes] = await Promise.allSettled([
      fetch(`${SCRIPT_URL}?action=quickmsg`).then(r=>r.json()),
      fetch(`${SCRIPT_URL}`).then(r=>r.json()),
    ]);

    const quickMsg  = calRes.status==='fulfilled' && calRes.value.status==='ok' ? calRes.value.message : null;
    const calEvents = qmRes.status==='fulfilled'  && qmRes.value.status==='ok'  ? qmRes.value.events  : [];

    render(calEvents, quickMsg);
    setSyncStatus('live', 'Live');

  } catch(e) {
    // Still render with local data only
    render([], null);
    setSyncStatus('error', 'Offline');
  }
}

/* ════ INIT ════ */
updateClock();
setInterval(updateClock, 10000);
loadData();
setInterval(loadData, 60000);
</script>
