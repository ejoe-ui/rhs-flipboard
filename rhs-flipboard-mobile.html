<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Redirecting...</title>
<script>
  // Preserve all URL parameters (?uid=, ?student=, etc.)
  // and redirect from old filename to new one
  const params = window.location.search;
  window.location.replace('mobile.html' + params);
</script>
</head>
<body></body>
</html>
