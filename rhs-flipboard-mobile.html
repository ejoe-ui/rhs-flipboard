<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>RHS · Room 27</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --green: #006938;
    --green-dark: #004d28;
    --green-dim: #003d20;
    --tan: #C4BEB5;
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #181818;
    --border: #222222;
    --border2: #2a2a2a;
    --text: #f0ebe0;
    --text-mid: #888880;
    --text-dim: #444440;
    --mono: 'Courier New', Courier, monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --radius: 10px;
  }

  html {
    background: var(--bg);
    min-height: 100%;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding-bottom: env(safe-area-inset-bottom, 20px);
    padding-bottom: calc(80px + env(safe-area-inset-bottom, 0px));
  }

  /* ── HEADER ── */
  #header {
    background: #0a0a0a;
    border-bottom: 2px solid var(--green);
    padding: 14px 16px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .h-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .h-badge {
    background: var(--green);
    color: #fff;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 0.15em;
    padding: 4px 10px;
    border-radius: 3px;
    text-transform: uppercase;
  }

  .h-sync {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .sync-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #333;
    flex-shrink: 0;
  }
  .sync-dot.live { background: var(--green); animation: pulse 2.5s infinite; }
  .sync-dot.error { background: #882222; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .sync-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .h-clock {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.05em;
  }

  /* ── ACCENT ── */
  .accent-bar {
    height: 2px;
    background: linear-gradient(90deg, var(--green-dark), var(--green), var(--tan), var(--green), var(--green-dark));
  }

  /* ── SCROLL AREA ── */
  #content {
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 14px 7px;
    border-bottom: 1px solid var(--border);
  }

  .card-label {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .card-label.green { color: var(--green); }
  .card-label.tan   { color: var(--tan); }

  .card-tag {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    border: 1px solid var(--border2);
    padding: 2px 7px;
    border-radius: 3px;
  }

  .card-body {
    padding: 12px 14px;
  }

  /* ── SCHEDULE CARD ── */
  .schedule-type {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--green);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .period-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 10px;
    border-radius: 6px;
    margin-bottom: 4px;
    background: transparent;
    transition: background 0.15s;
  }

  .period-row.now {
    background: var(--green-dim);
    border: 1px solid var(--green);
  }

  .period-row.past { opacity: 0.4; }

  .period-name {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--text);
    min-width: 72px;
  }

  .period-time {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-mid);
    letter-spacing: 0.04em;
    flex: 1;
  }

  .now-badge {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--green);
    text-transform: uppercase;
    border: 1px solid var(--green);
    padding: 2px 6px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .break-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 4px 10px;
    margin-bottom: 4px;
  }

  .break-name {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    min-width: 72px;
  }

  .break-time {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
  }

  /* ── CALENDAR CARD ── */
  .event-row {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
  }

  .event-row:last-child { border-bottom: none; }

  .event-time {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-mid);
    letter-spacing: 0.04em;
    min-width: 60px;
    padding-top: 1px;
    flex-shrink: 0;
  }

  .event-title {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--text);
    line-height: 1.4;
  }

  .no-events {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    text-align: center;
    padding: 8px 0;
  }

  /* ── COUNTDOWN CARD ── */
  .countdown-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
  }

  .countdown-row:last-child { border-bottom: none; }

  .countdown-label {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--text);
  }

  .countdown-days {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    color: var(--green);
    letter-spacing: 0.04em;
    white-space: nowrap;
  }

  .countdown-days.soon { color: #ff9900; }
  .countdown-days.today { color: var(--green); }

  /* ── BIRTHDAY CARD ── */
  .bday-today {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--text);
    line-height: 1.6;
  }

  .bday-week {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-mid);
    letter-spacing: 0.04em;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
    line-height: 1.7;
  }

  /* ── FACTS CARD ── */
  .fact-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--tan);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .fact-text {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--text);
    line-height: 1.6;
  }

  /* ── MESSAGE CARD ── */
  .msg-from {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .msg-text {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--text);
    line-height: 1.6;
  }

  /* ── QUICK MESSAGES CARD ── */
  .qm-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }
  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }
  .modal-sheet {
    background: #111;
    border-top: 2px solid var(--green);
    border-radius: 16px 16px 0 0;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    padding: 0 0 env(safe-area-inset-bottom, 16px);
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  .modal-overlay.open .modal-sheet {
    transform: translateY(0);
  }
  .modal-handle {
    width: 36px;
    height: 4px;
    background: var(--border2);
    border-radius: 2px;
    margin: 12px auto 8px;
  }
  .modal-title {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--green);
    padding: 0 16px 12px;
    border-bottom: 1px solid var(--border);
  }
  .modal-body { padding: 12px 16px 20px; }

  .modal-period-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 12px;
    border-radius: 8px;
    margin-bottom: 4px;
  }
  .modal-period-row.now {
    background: var(--green-dim);
    border: 1px solid var(--green);
  }
  .modal-period-row.past { opacity: 0.35; }
  .modal-p-name {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    min-width: 76px;
  }
  .modal-p-time {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-mid);
    flex: 1;
  }
  .modal-p-now {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 700;
    color: var(--green);
    border: 1px solid var(--green);
    padding: 2px 7px;
    border-radius: 3px;
  }
  .modal-break-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 5px 12px;
    margin-bottom: 4px;
  }
  .modal-break-name {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    min-width: 76px;
  }
  .modal-break-time {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
  }

  /* ── TAPPABLE CARDS ── */
  .card.tappable { cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .card.tappable:active { opacity: 0.8; transform: scale(0.99); }

  /* ── BIRTHDAY MODAL ── */
  .bday-card-modal {
    text-align: center;
    padding: 20px 0 10px;
  }
  .bday-icon {
    font-size: 72px;
    display: block;
    margin-bottom: 12px;
    animation: bounce 0.6s ease;
  }
  @keyframes bounce {
    0%   { transform: scale(0.5); opacity: 0; }
    60%  { transform: scale(1.2); }
    100% { transform: scale(1); opacity: 1; }
  }
  .bday-name-big {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 900;
    letter-spacing: 0.06em;
    color: var(--text);
    margin-bottom: 6px;
  }
  .bday-wish {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--green);
    letter-spacing: 0.08em;
    margin-bottom: 16px;
  }
  .bday-tap-btn {
    display: inline-block;
    background: var(--green);
    color: #fff;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 12px 24px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.1s, background 0.15s;
    width: 100%;
    margin-bottom: 10px;
  }
  .bday-tap-btn:active { transform: scale(0.95); background: var(--green-dark); }
  .bday-tap-count {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ── EVENT DETAIL ── */
  .event-detail-title {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--text);
    margin-bottom: 8px;
    line-height: 1.4;
  }
  .event-detail-meta {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-mid);
    letter-spacing: 0.04em;
    line-height: 1.8;
  }

  /* ── POST BUTTON (fixed bottom) ── */
  #post-btn-wrap {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 12px 16px;
    padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
    background: linear-gradient(transparent, var(--bg) 30%);
    z-index: 100;
  }

  .post-btn {
    display: block;
    width: 100%;
    background: var(--green);
    color: #fff;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 900;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    text-align: center;
    text-decoration: none;
    padding: 14px;
    border-radius: var(--radius);
    border: none;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s, transform 0.1s;
  }

  .post-btn:active { background: var(--green-dark); transform: scale(0.98); }

  /* ── PASS STATUS CARD ── */
  .pass-status-card {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    overflow: hidden;
    border-left: 4px solid var(--green);
  }

  .pass-status-card.warning {
    border-left-color: #ff9900;
  }

  .pass-out-time {
    font-family: var(--mono);
    font-size: 36px;
    font-weight: 900;
    color: var(--text);
    letter-spacing: 0.04em;
    line-height: 1;
    margin-bottom: 4px;
  }

  .pass-out-time.warning { color: #ff9900; }

  .pass-status-label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-mid);
    margin-bottom: 12px;
  }

  .pass-stats {
    display: flex;
    gap: 16px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }

  .pass-stat {
    flex: 1;
    text-align: center;
  }

  .pass-stat-num {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    display: block;
  }

  .pass-stat-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .pass-checked-in {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--green);
    text-transform: uppercase;
  }

  /* ── LOADING STATE ── */
  .loading-card {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 20px 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .loading-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: ldot 1.2s infinite ease-in-out;
  }
  .loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .loading-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes ldot { 0%,80%,100%{opacity:0.2;transform:scale(0.8)} 40%{opacity:1;transform:scale(1)} }

  .error-state {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-align: center;
    padding: 16px;
    text-transform: uppercase;
  }

  /* ── PERIOD TIMER CARD ── */
  .period-timer-card {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    border-left: 4px solid var(--green);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .period-timer-card.warning { border-left-color: #ff9900; }
  .period-timer-card.ending  { border-left-color: #cc4444; }

  .pt-left { flex: 1; }

  .pt-period {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--green);
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .pt-period.warning { color: #ff9900; }
  .pt-period.ending  { color: #cc4444; }

  .pt-ends {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .pt-time {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 900;
    color: var(--text);
    letter-spacing: 0.04em;
    text-align: right;
  }

  .pt-time.warning { color: #ff9900; }
  .pt-time.ending  { color: #cc4444; }

  .pt-label {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-align: right;
  }

  /* ── NO SCHOOL ── */
  .no-school {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--text-mid);
    text-transform: uppercase;
    text-align: center;
    padding: 8px 0;
  }

  .next-day {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    text-align: center;
    margin-top: 4px;
  }
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div class="h-left">
    <div class="h-badge">RHS · Room 27</div>
    <div class="h-sync">
      <div class="sync-dot" id="syncDot"></div>
      <span class="sync-label" id="syncLabel">Loading</span>
    </div>
  </div>
  <div class="h-clock" id="clock">--:-- --</div>
</div>
<div class="accent-bar"></div>

<!-- CONTENT -->
<div id="content">
  <div class="loading-card">
    <div class="loading-dot"></div>
    <div class="loading-dot"></div>
    <div class="loading-dot"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal-sheet" id="modalSheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- POST BUTTON -->
<div id="post-btn-wrap">
  <a class="post-btn" href="https://ejoe-ui.github.io/rhs-flipboard/rhs-flipboard-post.html">
    ▶ Post a Message to the Board
  </a>
</div>

<script>
const SCRIPT_URL  = 'https://script.google.com/macros/s/AKfycbwdoA4UVuCyq8RU7hP6dBrRWAMVcMqq-0DNmZE09j6oVst1iPa7KzWq7raoCT3i0SL_/exec';
const SHEET_ID    = '1xkHmsc-7LgDWaQ0Oblb2hgSqOuABi56Zu2EeDcsJ_v4';
const SUPABASE_URL = 'https://lgsfrhibzxjwcudjvfzx.supabase.co';
// SUPABASE_KEY loaded from config.js

/* ════ SCHEDULES ════ */
const SCHEDULES = {
  REGULAR: { label: 'Regular Bell Schedule', periods: [
    { name: 'P1', start: '8:10', end: '9:02' },
    { name: 'P2', start: '9:06', end: '9:56' },
    { name: 'BRUNCH', start: '9:56', end: '10:11', break: true },
    { name: 'P3', start: '10:15', end: '11:05' },
    { name: 'P4', start: '11:09', end: '11:59' },

/* ════ HELPERS ════ */
function localDateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function timeToMins(t) {
  const [h,m] = t.split(':').map(Number);
  return h*60+m;
}

function nowMins() {
  const n = new Date();
  return n.getHours()*60 + n.getMinutes();
}

function fmtTime12(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr);
  let h = d.getHours(), m = d.getMinutes();
  const ap = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return m > 0 ? `${h}:${String(m).padStart(2,'0')} ${ap}` : `${h}:00 ${ap}`;
}

function daysUntil(dateStr) {
  const now = new Date();
  const target = new Date(dateStr + 'T00:00:00');
  const diff = target - new Date(now.getFullYear(), now.getMonth(), now.getDate());
  return Math.ceil(diff / 86400000);
}

function detectSchedule(calEvents) {
  const now = new Date();
  const dow = now.getDay();
  const dateStr = localDateStr(now);
  if (dow === 0 || dow === 6 || NO_SCHOOL.has(dateStr)) return null;
  if (calEvents) {
    for (const e of calEvents) {
      const t = (e.title||'').toLowerCase();
      if (t.includes('foggy') || t.includes('late arrival')) return 'FOGGY';
      if (t.includes('minimum')) return 'MINIMUM';
      if (t.includes('early release')) return 'EARLY_RELEASE';
      if (t.includes('block')) return dow === 4 ? 'BLOCK_THU' : 'BLOCK_WED';
    }
  }
  if (dow === 1) return 'EARLY_RELEASE';
  if (dow === 3) return 'BLOCK_WED';
  if (dow === 4) return 'BLOCK_THU';
  return 'REGULAR';
}

function updateClock() {
  const now = new Date();
  let h = now.getHours();
  const m = now.getMinutes().toString().padStart(2,'0');
  const ap = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  document.getElementById('clock').textContent = `${h}:${m} ${ap}`;
}

function setSyncStatus(state, label) {
  const dot = document.getElementById('syncDot');
  dot.className = 'sync-dot' + (state === 'live' ? ' live' : state === 'error' ? ' error' : '');
  document.getElementById('syncLabel').textContent = label;
}

function render(calEvents, quickMsg, passData) {

  const nm       = nowMins();

  const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const schedKey = detectSchedule(calEvents);
  const schedule = schedKey ? SCHEDULES[schedKey] : null;

  const sections = [];

  /* ── PASS STATUS (if student identified via URL) ── */
  if (passData) {
    const passCard = renderPassCard(passData);
    if (passCard) sections.push(passCard);

  /* ── PERIOD TIMER ── */

  const timerCard = buildPeriodTimerCard();

  /* ── SCHEDULE ── */
  const schedCard = document.createElement('div');
  schedCard.className = 'card tappable';
  if (!schedule) {
    const next = getNextSchoolDay();
    schedCard.innerHTML = `
      <div class="card-header">
        <span class="card-label green">Bell Schedule</span>
        <span class="card-tag">Today</span>
      </div>
      <div class="card-body">
        <div class="no-school">No School Today</div>
        ${next ? `<div class="next-day">Next school day: ${next.label} · ${next.schedLabel}</div>` : ''}
      </div>`;
  } else {
    const periods = schedule.periods;
    let rows = '';
    for (const p of periods) {
      const start = timeToMins(p.start);
      const end   = timeToMins(p.end);
      const isNow = nm >= start && nm < end;
      const isPast = nm >= end;
      if (p.break) {
        rows += `<div class="break-row${isPast ? ' past' : ''}">
          <span class="break-name">${p.name}</span>
          <span class="break-time">${p.start} – ${p.end}</span>
          ${isNow ? '<span class="now-badge">NOW</span>' : ''}
        </div>`;
      } else {
        rows += `<div class="period-row${isNow ? ' now' : isPast ? ' past' : ''}">
          <span class="period-name">${p.name}</span>
          <span class="period-time">${p.start} – ${p.end}</span>
          ${isNow ? '<span class="now-badge">NOW</span>' : ''}
        </div>`;
      }
    }
    schedCard.innerHTML = `
      <div class="card-header">
        <span class="card-label green">Bell Schedule</span>
        <span class="card-tag">${schedule.label}</span>
      </div>
      <div class="card-body">${rows}</div>`;
  }
  if (schedKey) schedCard.onclick = () => openScheduleModal(schedKey);
  sections.push(schedCard);

  /* ── CALENDAR ── */
  const calCard = document.createElement('div');
  calCard.className = 'card';
  const todayEvts = (calEvents || []).filter(e => {
    const d = new Date(e.start);
    return d.toDateString() === now.toDateString();
  }).sort((a,b) => new Date(a.start) - new Date(b.start));
  const upcomingEvts = (calEvents || []).filter(e => {
    const d = new Date(e.start);
    return d.toDateString() !== now.toDateString() && d > now;
  }).slice(0,6);

  let calContent = '';
  if (todayEvts.length) {
    calContent = todayEvts.map(e => `
      <div class="event-row tappable" style="cursor:pointer" onclick='openEventModal(${JSON.stringify(e)})'>
        <span class="event-time">${e.allDay ? 'All Day' : fmtTime12(e.start)}</span>
        <span class="event-title">${e.title}</span>
      </div>`).join('');
  } else if (upcomingEvts.length) {
    calContent = upcomingEvts.map(e => {
      const d = new Date(e.start);
      return `<div class="event-row tappable" style="cursor:pointer" onclick='openEventModal(${JSON.stringify(e)})'>
        <span class="event-time">${monNames[d.getMonth()]} ${d.getDate()}</span>
        <span class="event-title">${e.title}</span>
      </div>`;
    }).join('');
  } else {
    calContent = '<div class="no-events">No events today</div>';
  }
  calCard.innerHTML = `
    <div class="card-header">
      <span class="card-label">RHS Events</span>
      <span class="card-tag">${todayEvts.length ? 'Today' : 'Upcoming'}</span>
    </div>
    <div class="card-body">${calContent}</div>`;
  sections.push(calCard);

  /* ── COUNTDOWNS ── */
  const upcoming = COUNTDOWNS
    .map(c => ({ ...c, days: daysUntil(c.date) }))
    .filter(c => c.days >= 0 && c.days <= 365)
    .sort((a,b) => a.days - b.days)
    .slice(0,8);

  if (upcoming.length) {
    const cdCard = document.createElement('div');
    cdCard.className = 'card';
    const cdRows = upcoming.map(c => {
      const cls = c.days === 0 ? 'today' : c.days <= 7 ? 'soon' : '';
      const label = c.days === 0 ? 'TODAY' : c.days === 1 ? '1 DAY' : `${c.days} DAYS`;
      return `<div class="countdown-row">
        <span class="countdown-label">${c.label}</span>
        <span class="countdown-days ${cls}">${label}</span>

    }).join('');
    cdCard.innerHTML = `
      <div class="card-header">
        <span class="card-label">Countdowns</span>
      </div>
      <div class="card-body">${cdRows}</div>`;
    sections.push(cdCard);
  }

  /* ── BIRTHDAYS ── */
  const today = { m: now.getMonth()+1, d: now.getDate() };
  const dow = now.getDay();
  const monday = new Date(now);
  monday.setDate(now.getDate() - (dow === 0 ? 6 : dow-1));
  const weekDates = Array.from({length:7},(_,i)=>{
    const d = new Date(monday); d.setDate(monday.getDate()+i);
    return {m:d.getMonth()+1, d:d.getDate()};
  });
  const todayBdays = BIRTHDAYS.filter(b => b.month===today.m && b.day===today.d);
  const weekBdays  = BIRTHDAYS.filter(b => weekDates.some(w=>w.m===b.month&&w.d===b.day) && !(b.month===today.m&&b.day===today.d));

  if (todayBdays.length || weekBdays.length) {
    const bdCard = document.createElement('div');
    bdCard.className = 'card';
    let bdContent = '';
    if (todayBdays.length) {
      bdContent += `<div class="bday-today">${todayBdays.map(b=>`
        <div style="cursor:pointer;padding:4px 0;-webkit-tap-highlight-color:transparent" onclick='openBdayModal(${JSON.stringify(b)})'>

        </div>`).join('')}</div>`;
    }
    if (weekBdays.length) {
      bdContent += `<div class="bday-week">${weekBdays.slice(0,5).map(b=>`
        <div style="cursor:pointer;padding:3px 0;-webkit-tap-highlight-color:transparent" onclick='openBdayModal(${JSON.stringify(b)})'>
          ${monNames[b.month-1]} ${b.day} · ${b.name}
          <span class="bday-week-count-${b.name.replace(/\s/g,'-')}" style="color:var(--green);font-size:10px"></span>
        </div>`).join('')}</div>`;
    }
    bdCard.innerHTML = `
      <div class="card-header">
        <span class="card-label">${todayBdays.length ? '🎂 Happy Birthday!' : 'Birthdays This Week'}</span>
      </div>
      <div class="card-body">${bdContent}</div>`;
    sections.push(bdCard);
  }

  /* ── QUICK MESSAGE ── */
  if (quickMsg && quickMsg.line1) {
    const sender = quickMsg.sender && quickMsg.sender !== 'ANONYMOUS' ? quickMsg.sender : 'Room 27';
    const posted = new Date(quickMsg.timestamp);
    const timeStr = posted.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    const lines = [quickMsg.line1, quickMsg.line2, quickMsg.line3].filter(l=>l&&l.trim());
    const qmCard = document.createElement('div');

    sections.push(qmCard);

  /* ── DID YOU KNOW ── */
  const dayOfYear = Math.floor((now - new Date(now.getFullYear(),0,0))/86400000);

    </div>`;
  sections.push(factCard);

  /* ── RENDER ── */
  const content = document.getElementById('content');
  content.innerHTML = '';
  sections.forEach(s => content.appendChild(s));

/* ════ PERIOD TIMER ════ */
function buildPeriodTimerCard() {
  const schedKey = detectSchedule(window._mobileCalEvents || []);
  if (!schedKey || schedKey === 'FOGGY') return null;

  const schedule = SCHEDULES[schedKey];
  if (!schedule) return null;

  const now     = new Date();
  const nowMins = now.getHours() * 60 + now.getMinutes();
  const nowSecs = now.getSeconds();

  // Find current period
  for (const p of schedule.periods) {
    const start = timeToMins(p.start);
    const end   = timeToMins(p.end);
    if (nowMins >= start && nowMins < end) {
      const remaining = (end - nowMins) * 60 - nowSecs;
      const remMins   = Math.floor(remaining / 60);
      const remSecs   = remaining % 60;
      const cls       = remMins < 1 ? 'ending' : remMins < 5 ? 'warning' : '';
      const timeStr   = remMins > 0
        ? remMins + ':' + String(remSecs).padStart(2,'0')
        : '0:' + String(remSecs).padStart(2,'0');

      const card = document.createElement('div');
      card.className = `period-timer-card ${cls}`;
      card.innerHTML = `
        <div class="pt-left">
          <div class="pt-period ${cls}">${p.break ? p.name : p.name} · ${schedule.label}</div>
          <div class="pt-ends">Ends at ${p.end}</div>
        </div>
        <div>
          <div class="pt-time ${cls}">${timeStr}</div>
          <div class="pt-label">remaining</div>
        </div>`;
      return card;
    }
  }

  // Between periods — show next
  for (const p of schedule.periods) {
    const start = timeToMins(p.start);
    if (nowMins < start) {
      const minsUntil = start - nowMins;
      const card = document.createElement('div');
      card.className = 'period-timer-card';
      card.innerHTML = `
        <div class="pt-left">
          <div class="pt-period">Next: ${p.name}</div>
          <div class="pt-ends">Starts at ${p.start}</div>
        </div>
        <div>
          <div class="pt-time">${minsUntil}</div>
          <div class="pt-label">min away</div>
        </div>`;
      return card;
    }
  }
  return null;
}

function getNextSchoolDay() {
  const monNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const now = new Date();
  for (let i=1;i<=7;i++) {
    const d = new Date(now);
    d.setDate(now.getDate()+i);
    const dow = d.getDay();
    const ds = localDateStr(d);
    if (dow===0||dow===6||NO_SCHOOL.has(ds)) continue;
    const schedLabels = {1:'Early Release',3:'Block 1-3-5-7',4:'Block 2-4-6-7',2:'Regular',5:'Regular'};
    return { label: `${dayNames[dow]} ${monNames[d.getMonth()]} ${d.getDate()}`, schedLabel: schedLabels[dow]||'Regular' };
  }
  return null;
}

/* ════ DATA FETCH ════ */
async function loadData() {
  setSyncStatus('', 'Loading...');

  // Check for PassAble UID/student in URL params
  const params    = new URLSearchParams(window.location.search);
  const uid       = params.get('uid');
  const studentId = params.get('student');

  try {
    // Fetch all data in parallel
    const fetches = [
      fetch(`${SCRIPT_URL}?action=quickmsg`).then(r=>r.json()).catch(()=>null),
      fetch(`${SCRIPT_URL}`).then(r=>r.json()).catch(()=>null),
    ];

    // Also fetch pass status if we have a UID or student ID
    if (uid || studentId) {
      fetches.push(fetchPassStatus(uid, studentId));
    }

    const results   = await Promise.allSettled(fetches);
    const quickMsg  = results[0].value?.status==='ok' ? results[0].value.message : null;
    const calEvents = results[1].value?.status==='ok' ? results[1].value.events  : [];
    const passData  = (uid || studentId) ? results[2]?.value : null;

    render(calEvents, quickMsg, passData);
    setSyncStatus('live', 'Live');

  } catch(e) {
    render([], null, null);
    setSyncStatus('error', 'Offline');
  }
}

  document.getElementById('modal').classList.remove('open');

}

/* ── SCHEDULE MODAL ── */
function openScheduleModal(schedKey) {
  const schedule = SCHEDULES[schedKey];
  if (!schedule) return;
  const nm = nowMins();
  let rows = '';
  for (const p of schedule.periods) {
    const start = timeToMins(p.start);
    const end   = timeToMins(p.end);
    const isNow  = nm >= start && nm < end;
    const isPast = nm >= end;
    if (p.break) {
      rows += `<div class="modal-break-row${isPast?' past':''}">
        <span class="modal-break-name">${p.name}</span>
        <span class="modal-break-time">${p.start} – ${p.end}</span>
        ${isNow?'<span class="modal-p-now">NOW</span>':''}
      </div>`;
    } else {
      rows += `<div class="modal-period-row${isNow?' now':isPast?' past':''}">
        <span class="modal-p-name">${p.name}</span>
        <span class="modal-p-time">${p.start} – ${p.end}</span>
        ${isNow?'<span class="modal-p-now">NOW</span>':''}
      </div>`;
    }
  }
  openModal(schedule.label, rows);
}

/* ── EVENT MODAL ── */
function openEventModal(evt) {
  const monNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const d = new Date(evt.start);
  const timeStr = evt.allDay ? 'All Day' : fmtTime12(evt.start);
  const dateStr = `${monNames[d.getMonth()]} ${d.getDate()}`;
  let body = `<div class="event-detail-title">${evt.title}</div>
    <div class="event-detail-meta">
      📅 ${dateStr}<br>
      ⏰ ${timeStr}
      ${evt.location ? `<br>📍 ${evt.location}` : ''}
    </div>`;
  openModal('Event Details', body);
}

/* ── BIRTHDAY MODAL ── */
const BDAY_ICONS = ['🎉','🎂','🎁','🪅','🎈','🥳','🎊'];

// Shared birthday counts via Apps Script
const bdayCountCache = {};

async function getBdayCount(name) {
  if (bdayCountCache[name] !== undefined) return bdayCountCache[name];
  try {
    const res  = await fetch(`${SCRIPT_URL}?action=bdaycount&name=${encodeURIComponent(name)}`);
    const data = await res.json();
    bdayCountCache[name] = data.count || 0;
    return bdayCountCache[name];
  } catch(e) { return 0; }
}

async function incrementBday(name) {
  try {
    const res  = await fetch(`${SCRIPT_URL}?action=bdaytap&name=${encodeURIComponent(name)}`);
    const data = await res.json();
    bdayCountCache[name] = data.count || 0;
    return bdayCountCache[name];
  } catch(e) {
    bdayCountCache[name] = (bdayCountCache[name] || 0) + 1;
    return bdayCountCache[name];
  }
}

function openBdayModal(person) {
  const icon = BDAY_ICONS[Math.floor(Math.random() * BDAY_ICONS.length)];
  const count = getBdayCount(person.name);
  const wishes = [
    'HAPPY BIRTHDAY!',
    'HAVE AN AMAZING DAY!',
    'YOU ARE AWESOME!',
    'MAKE IT A GREAT ONE!',
    'WE SEE YOU TODAY!',
  ];
  const wish = wishes[Math.floor(Math.random() * wishes.length)];

  const body = `
    <div class="bday-card-modal">
      <span class="bday-icon" id="bdayIcon">${icon}</span>
      <div class="bday-name-big">${person.name}</div>
      <div class="bday-wish">${wish}</div>
      <button class="bday-tap-btn" onclick="tapBday('${person.name.replace(/'/g,"\'")}')">
        🎉 Send Birthday Wishes
      </button>
      <div class="bday-tap-count" id="bdayCount">
        ${count > 0 ? count + ' wish' + (count !== 1 ? 'es' : '') + ' sent so far' : 'Be the first to send wishes!'}
      </div>
    </div>`;
  openModal('', body);
}

function tapBday(name) {
  const count = incrementBday(name);
  const el = document.getElementById('bdayCount');
  if (el) el.textContent = count + ' wish' + (count !== 1 ? 'es' : '') + ' sent so far!';
  // Animate icon
  const icon = document.getElementById('bdayIcon');
  if (icon) {
    icon.style.animation = 'none';
    icon.offsetHeight; // reflow
    icon.style.animation = 'bounce 0.5s ease';
    // Cycle icons
    const icons = ['🎉','🎂','🎁','🪅','🎈','🥳','🎊'];
    icon.textContent = icons[Math.floor(Math.random() * icons.length)];
  }
}

/* ════ PASSABLE ════ */
async function fetchPassStatus(uid, studentId) {
  try {
    // Fetch current active pass for this student
    let query = `${SUPABASE_URL}/rest/v1/passes?select=*&time_in=is.null&order=time_out.desc&limit=1`;
    if (studentId) query += `&student_id=eq.${studentId}`;

    const passRes = await fetch(query, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });

    // Fetch student info
    let student = null;
    if (uid || studentId) {
      let sQuery = `${SUPABASE_URL}/rest/v1/students?select=*&limit=1`;
      if (uid) sQuery += `&nfc_uid=eq.${uid}`;
      else if (studentId) sQuery += `&id=eq.${studentId}`;

      const sRes = await fetch(sQuery, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
      });
      const sData = await sRes.json();
      student = sData[0] || null;
    }

    // Fetch weekly stats
    const weekStart = new Date();
    weekStart.setDate(weekStart.getDate() - weekStart.getDay());
    weekStart.setHours(0,0,0,0);

    let statsQuery = `${SUPABASE_URL}/rest/v1/passes?select=duration_minutes&time_out=gte.${weekStart.toISOString()}`;
    if (student) statsQuery += `&student_id=eq.${student.id}`;

    const statsRes = await fetch(statsQuery, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });

    const passes     = await passRes.json();
    const weekPasses = await statsRes.json();
    const activePass = passes[0] || null;
    const weekCount  = weekPasses.length;
    const weekMins   = weekPasses.reduce((sum, p) => sum + (p.duration_minutes || 0), 0);

    return { student, activePass, weekCount, weekMins };
  } catch(e) {
    return null;
  }
}

function minsOut(timeOut) {
  return Math.floor((new Date() - new Date(timeOut)) / 60000);
}

function renderPassCard(data) {
  if (!data) return null;
  const { student, activePass, weekCount, weekMins } = data;
  const name = student ? student.full_name : 'Student';

  const card = document.createElement('div');

  if (activePass) {
    const mins    = minsOut(activePass.time_out);
    const warning = mins > 10;
    card.className = `pass-status-card${warning ? ' warning' : ''}`;
    card.innerHTML = `
      <div class="card-header">
        <span class="card-label${warning ? '' : ' green'}">${warning ? '⚠ Pass Active' : '✓ Pass Active'}</span>
        <span class="card-tag">${name}</span>
      </div>
      <div class="card-body">
        <div class="pass-out-time${warning ? ' warning'  : ''}">${mins} MIN</div>
        <div class="pass-status-label">Currently out · ${activePass.reason || 'Hall pass'}</div>
        <div class="pass-stats">
          <div class="pass-stat">
            <span class="pass-stat-num">${weekCount}</span>
            <span class="pass-stat-label">Passes this week</span>
          </div>
          <div class="pass-stat">
            <span class="pass-stat-num">${weekMins}</span>
            <span class="pass-stat-label">Total minutes</span>
          </div>
        </div>
      </div>`;
  } else {
    card.className = 'pass-status-card';
    card.innerHTML = `
      <div class="card-header">
        <span class="card-label green">Pass Status</span>
        <span class="card-tag">${name}</span>
      </div>
      <div class="card-body">
        <div class="pass-checked-in">✓ Checked In</div>
        <div class="pass-stats" style="margin-top:10px">
          <div class="pass-stat">
            <span class="pass-stat-num">${weekCount}</span>
            <span class="pass-stat-label">Passes this week</span>
          </div>
          <div class="pass-stat">
            <span class="pass-stat-num">${weekMins}</span>
            <span class="pass-stat-label">Total minutes</span>
          </div>
        </div>
      </div>`;
  }
  return card;
}
