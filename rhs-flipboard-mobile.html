<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>RHS · Room 27</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --green: #006938;
    --green-dark: #004d28;
    --green-dim: #003d20;
    --tan: #C4BEB5;
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #181818;
    --border: #222222;
    --border2: #2a2a2a;
    --text: #f0ebe0;
    --text-mid: #888880;
    --text-dim: #444440;
    --mono: 'Courier New', Courier, monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --radius: 10px;
  }

  html { background: var(--bg); min-height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding-bottom: env(safe-area-inset-bottom, 20px);
    padding-bottom: calc(80px + env(safe-area-inset-bottom, 0px));
  }

  /* ── HEADER ── */
  #header {
    background: #0a0a0a;
    border-bottom: 2px solid var(--green);
    padding: 14px 16px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .h-left { display: flex; align-items: center; gap: 10px; }
  .h-badge {
    background: var(--green);
    color: #fff;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 0.15em;
    padding: 4px 10px;
    border-radius: 3px;
    text-transform: uppercase;
  }
  .h-sync { display: flex; align-items: center; gap: 5px; }
  .sync-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #333;
    flex-shrink: 0;
  }
  .sync-dot.live { background: var(--green); animation: pulse 2.5s infinite; }
  .sync-dot.error { background: #882222; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .sync-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  .h-clock {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.05em;
  }

  /* ── ACCENT ── */
  .accent-bar {
    height: 2px;
    background: linear-gradient(90deg, var(--green-dark), var(--green), var(--tan), var(--green), var(--green-dark));
  }

  /* ── SCROLL AREA ── */
  #content {
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 14px 7px;
    border-bottom: 1px solid var(--border);
  }
  .card-label {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .card-label.green { color: var(--green); }
  .card-label.tan   { color: var(--tan); }
  .card-tag {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    border: 1px solid var(--border2);
    padding: 2px 7px;
    border-radius: 3px;
  }
  .card-body { padding: 12px 14px; }

  /* ── SCHEDULE CARD ── */
  .schedule-type {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--green);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .period-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 10px;
    border-radius: 6px;
    margin-bottom: 4px;
    background: transparent;
    transition: background 0.15s;
  }
  .period-row.now { background: var(--green-dim); border: 1px solid var(--green); }
  .period-row.past { opacity: 0.4; }
  .period-name {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--text);
    min-width: 72px;
  }
  .period-time {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-mid);
    letter-spacing: 0.04em;
    flex: 1;
  }
  .now-badge {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--green);
    text-transform: uppercase;
    border: 1px solid var(--green);
    padding: 2px 6px;
    border-radius: 3px;
    flex-shrink: 0;
  }
  .break-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 4px 10px;
    margin-bottom: 4px;
  }
  .break-name {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    min-width: 72px;
  }
  .break-time {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
  }

  /* ── CALENDAR CARD ── */
  .event-row {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
  }
  .event-row:last-child { border-bottom: none; }
  .event-time {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-mid);
    letter-spacing: 0.04em;
    min-width: 60px;
    padding-top: 1px;
    flex-shrink: 0;
  }
  .event-title {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--text);
    line-height: 1.4;
  }
  .no-events {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    text-align: center;
    padding: 8px 0;
  }

  /* ── COUNTDOWN CARD ── */
  .countdown-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
  }
  .countdown-row:last-child { border-bottom: none; }
  .countdown-label {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--text);
  }
  .countdown-days {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    color: var(--green);
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  .countdown-days.soon  { color: #ff9900; }
  .countdown-days.today { color: var(--green); }

  /* ── BIRTHDAY CARD ── */
  .bday-today {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--text);
    line-height: 1.6;
  }
  .bday-week {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-mid);
    letter-spacing: 0.04em;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
    line-height: 1.7;
  }

  /* ── FACTS CARD ── */
  .fact-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--tan);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .fact-text {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--text);
    line-height: 1.6;
  }

  /* ── MESSAGE CARD ── */
  .msg-from {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .msg-text {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--text);
    line-height: 1.6;
  }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal-sheet {
    background: #111;
    border-top: 2px solid var(--green);
    border-radius: 16px 16px 0 0;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    padding: 0 0 env(safe-area-inset-bottom, 16px);
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  .modal-overlay.open .modal-sheet { transform: translateY(0); }
  .modal-handle {
    width: 36px; height: 4px;
    background: var(--border2);
    border-radius: 2px;
    margin: 12px auto 8px;
  }
  .modal-title {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--green);
    padding: 0 16px 12px;
    border-bottom: 1px solid var(--border);
  }
  .modal-body { padding: 12px 16px 20px; }
  .modal-period-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 12px;
    border-radius: 8px;
    margin-bottom: 4px;
  }
  .modal-period-row.now { background: var(--green-dim); border: 1px solid var(--green); }
  .modal-period-row.past { opacity: 0.35; }
  .modal-p-name { font-family: var(--mono); font-size: 13px; font-weight: 700; color: var(--text); min-width: 76px; }
  .modal-p-time { font-family: var(--mono); font-size: 12px; color: var(--text-mid); flex: 1; }
  .modal-p-now {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 700;
    color: var(--green);
    border: 1px solid var(--green);
    padding: 2px 7px;
    border-radius: 3px;
  }
  .modal-break-row { display: flex; align-items: center; gap: 12px; padding: 5px 12px; margin-bottom: 4px; }
  .modal-break-name { font-family: var(--mono); font-size: 11px; color: var(--text-dim); min-width: 76px; }
  .modal-break-time { font-family: var(--mono); font-size: 11px; color: var(--text-dim); }

  /* ── TAPPABLE CARDS ── */
  .card.tappable { cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .card.tappable:active { opacity: 0.8; transform: scale(0.99); }

  /* ── BIRTHDAY MODAL ── */
  .bday-card-modal { text-align: center; padding: 20px 0 10px; }
  .bday-icon {
    font-size: 72px;
    display: block;
    margin-bottom: 12px;
    animation: bounce 0.6s ease;
  }
  @keyframes bounce {
    0%   { transform: scale(0.5); opacity: 0; }
    60%  { transform: scale(1.2); }
    100% { transform: scale(1); opacity: 1; }
  }
  .bday-name-big {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 900;
    letter-spacing: 0.06em;
    color: var(--text);
    margin-bottom: 6px;
  }
  .bday-wish { font-family: var(--mono); font-size: 13px; color: var(--green); letter-spacing: 0.08em; margin-bottom: 16px; }
  .bday-tap-btn {
    display: inline-block;
    background: var(--green);
    color: #fff;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 12px 24px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.1s, background 0.15s;
    width: 100%;
    margin-bottom: 10px;
  }
  .bday-tap-btn:active { transform: scale(0.95); background: var(--green-dark); }
  .bday-tap-count { font-family: var(--mono); font-size: 11px; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; }

  /* ── EVENT DETAIL ── */
  .event-detail-title {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--text);
    margin-bottom: 8px;
    line-height: 1.4;
  }
  .event-detail-meta { font-family: var(--mono); font-size: 12px; color: var(--text-mid); letter-spacing: 0.04em; line-height: 1.8; }

  /* ── POST BUTTON (fixed bottom) ── */
  #post-btn-wrap {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 12px 16px;
    padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
    background: linear-gradient(transparent, var(--bg) 30%);
    z-index: 100;
  }
  .post-btn {
    display: block;
    width: 100%;
    background: var(--green);
    color: #fff;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 900;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    text-align: center;
    text-decoration: none;
    padding: 14px;
    border-radius: var(--radius);
    border: none;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s, transform 0.1s;
  }
  .post-btn:active { background: var(--green-dark); transform: scale(0.98); }

  /* ── PASS STATUS CARD (circle timer) ── */
  .pass-status-card {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .pass-circle-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 14px 14px;
  }

  .pass-ring-svg {
    width: 140px;
    height: 140px;
    transform: rotate(-90deg);
    margin-bottom: 10px;
  }

  .pass-ring-bg {
    fill: none;
    stroke: var(--border2);
    stroke-width: 8;
  }

  .pass-ring-fg {
    fill: none;
    stroke: var(--green);
    stroke-width: 8;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear, stroke 0.5s;
  }

  .pass-ring-fg.warning { stroke: #ff9900; }
  .pass-ring-fg.ending  { stroke: #cc4444; }

  .pass-timer-center {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .pass-ring-container {
    position: relative;
    width: 140px;
    height: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 10px;
  }

  .pass-ring-inner {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .pass-elapsed-time {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 900;
    color: var(--text);
    letter-spacing: 0.04em;
    line-height: 1;
  }

  .pass-elapsed-time.warning { color: #ff9900; }
  .pass-elapsed-time.ending  { color: #cc4444; }

  .pass-elapsed-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-top: 3px;
  }

  .pass-remaining-text {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-mid);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .pass-reason-block {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 8px;
  }

  .pass-reason-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 4px;
  }

  .pass-reason-value {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--text);
  }

  .pass-checkout-block {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
  }

  .pass-checkout-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 4px;
  }

  .pass-checkout-value {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--text);
  }

  .pass-stats-row {
    display: flex;
    gap: 8px;
    width: 100%;
    margin-top: 8px;
  }

  .pass-stat-block {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    text-align: center;
  }

  .pass-stat-num {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    display: block;
    line-height: 1;
    margin-bottom: 4px;
  }

  .pass-stat-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .pass-checked-in-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 14px 14px;
  }

  .pass-checked-in-icon {
    font-size: 48px;
    margin-bottom: 8px;
  }

  .pass-checked-in-label {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--green);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .pass-scan-hint {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    text-transform: uppercase;
    text-align: center;
    padding: 10px 0 4px;
    border-top: 1px solid var(--border);
    width: 100%;
  }

  /* ── WEATHER CARD ── */
  .weather-main {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .weather-temp-wrap { display: flex; flex-direction: column; }

  .weather-temp {
    font-family: var(--mono);
    font-size: 48px;
    font-weight: 900;
    color: var(--text);
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .weather-feels {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-mid);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .weather-icon-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .weather-icon { font-size: 44px; line-height: 1; }

  .weather-desc {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-mid);
    text-align: center;
  }

  .weather-details {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .weather-detail-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
  }

  .weather-detail-label {
    font-family: var(--mono);
    font-size: 8px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 3px;
  }

  .weather-detail-value {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.04em;
  }

  /* ── LOADING STATE ── */
  .loading-card {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 20px 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .loading-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: ldot 1.2s infinite ease-in-out;
  }
  .loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .loading-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes ldot { 0%,80%,100%{opacity:0.2;transform:scale(0.8)} 40%{opacity:1;transform:scale(1)} }

  .error-state {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.08em;

<script>
const SCRIPT_URL   = 'https://script.google.com/macros/s/AKfycbwdoA4UVuCyq8RU7hP6dBrRWAMVcMqq-0DNmZE09j6oVst1iPa7KzWq7raoCT3i0SL_/exec';
const SHEET_ID     = '1xkHmsc-7LgDWaQ0Oblb2hgSqOuABi56Zu2EeDcsJ_v4';
const SUPABASE_URL = 'https://lgsfrhibzxjwcudjvfzx.supabase.co';
// SUPABASE_KEY loaded from config.js

// School coordinates (Reedley CA)
const WEATHER_LAT = 36.4552;
const WEATHER_LON = -119.8785;

function updateClock() {
  const now = new Date();
  let h = now.getHours();
  const m = now.getMinutes().toString().padStart(2,'0');
  const ap = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  document.getElementById('clock').textContent = `${h}:${m} ${ap}`;
}
function setSyncStatus(state, label) {
  const dot = document.getElementById('syncDot');
  dot.className = 'sync-dot' + (state === 'live' ? ' live' : state === 'error' ? ' error' : '');
  document.getElementById('syncLabel').textContent = label;
}

// Open-Meteo WMO code → emoji + description
/* ════ RENDER ════ */
function render(calEvents, quickMsg, passData, weatherData) {
  const now      = new Date();
  const nm       = nowMins();
  const monNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const schedKey = detectSchedule(calEvents);
  const schedule = schedKey ? SCHEDULES[schedKey] : null;
  const sections = [];

  /* ── PASS STATUS ── */
  if (passData) {
    const passCard = renderPassCard(passData);
    if (passCard) sections.push(passCard);
  }

  /* ── PERIOD TIMER ── */
  window._mobileCalEvents = calEvents || [];
  const timerCard = buildPeriodTimerCard();
  if (timerCard) sections.push(timerCard);

  /* ── WEATHER ── */
  sections.push(buildWeatherCard(weatherData));

  /* ── SCHEDULE ── */
  const schedCard = document.createElement('div');
  schedCard.className = 'card tappable';
  if (!schedule) {
    const next = getNextSchoolDay();
    schedCard.innerHTML = `
      <div class="card-header">
        <span class="card-label green">Bell Schedule</span>
        <span class="card-tag">Today</span>
      </div>
      <div class="card-body">
        <div class="no-school">No School Today</div>
        ${next ? `<div class="next-day">Next school day: ${next.label} · ${next.schedLabel}</div>` : ''}
      </div>`;
  } else {
    let rows = '';
    for (const p of schedule.periods) {
      const start = timeToMins(p.start);
      const end   = timeToMins(p.end);
      const isNow = nm >= start && nm < end;
      const isPast = nm >= end;
      if (p.break) {
        rows += `<div class="break-row${isPast ? ' past' : ''}">
          <span class="break-name">${p.name}</span>
          <span class="break-time">${p.start} – ${p.end}</span>
          ${isNow ? '<span class="now-badge">NOW</span>' : ''}
        </div>`;
      } else {
        rows += `<div class="period-row${isNow ? ' now' : isPast ? ' past' : ''}">
          <span class="period-name">${p.name}</span>
          <span class="period-time">${p.start} – ${p.end}</span>
          ${isNow ? '<span class="now-badge">NOW</span>' : ''}
        </div>`;
      }
    }
    schedCard.innerHTML = `
      <div class="card-header">
        <span class="card-label green">Bell Schedule</span>
        <span class="card-tag">${schedule.label}</span>
      </div>
      <div class="card-body">${rows}</div>`;
  }
  if (schedKey) schedCard.onclick = () => openScheduleModal(schedKey);
  sections.push(schedCard);

  /* ── CALENDAR ── */
  const calCard = document.createElement('div');
  calCard.className = 'card';
  const todayEvts = (calEvents || []).filter(e => {
    const d = new Date(e.start);
    return d.toDateString() === now.toDateString();
  }).sort((a,b) => new Date(a.start) - new Date(b.start));
  const upcomingEvts = (calEvents || []).filter(e => {
    const d = new Date(e.start);
    return d.toDateString() !== now.toDateString() && d > now;
  }).slice(0,6);

  let calContent = '';
  if (todayEvts.length) {
    calContent = todayEvts.map(e => `
      <div class="event-row tappable" style="cursor:pointer" onclick='openEventModal(${JSON.stringify(e)})'>
        <span class="event-time">${e.allDay ? 'All Day' : fmtTime12(e.start)}</span>
        <span class="event-title">${e.title}</span>
      </div>`).join('');
  } else if (upcomingEvts.length) {
    calContent = upcomingEvts.map(e => {
      const d = new Date(e.start);
      return `<div class="event-row tappable" style="cursor:pointer" onclick='openEventModal(${JSON.stringify(e)})'>
        <span class="event-time">${monNames[d.getMonth()]} ${d.getDate()}</span>
        <span class="event-title">${e.title}</span>
      </div>`;
    }).join('');
  } else {
    calContent = '<div class="no-events">No events today</div>';
  }
  calCard.innerHTML = `
    <div class="card-header">
      <span class="card-label">RHS Events</span>
      <span class="card-tag">${todayEvts.length ? 'Today' : 'Upcoming'}</span>
    </div>
    <div class="card-body">${calContent}</div>`;
  sections.push(calCard);

  /* ── COUNTDOWNS ── */
  const upcoming = COUNTDOWNS
    .map(c => ({ ...c, days: daysUntil(c.date) }))
    .filter(c => c.days >= 0 && c.days <= 365)
    .sort((a,b) => a.days - b.days)
    .slice(0,8);
  if (upcoming.length) {
    const cdCard = document.createElement('div');
    cdCard.className = 'card';
    const cdRows = upcoming.map(c => {
      const cls = c.days === 0 ? 'today' : c.days <= 7 ? 'soon' : '';
      const label = c.days === 0 ? 'TODAY' : c.days === 1 ? '1 DAY' : `${c.days} DAYS`;
      return `<div class="countdown-row">
        <span class="countdown-label">${c.label}</span>
        <span class="countdown-days ${cls}">${label}</span>
      </div>`;
    }).join('');
    cdCard.innerHTML = `
      <div class="card-header"><span class="card-label">Countdowns</span></div>
      <div class="card-body">${cdRows}</div>`;
    sections.push(cdCard);
  }

  /* ── BIRTHDAYS ── */
  const today = { m: now.getMonth()+1, d: now.getDate() };
  const dow = now.getDay();
  const monday = new Date(now);
  monday.setDate(now.getDate() - (dow === 0 ? 6 : dow-1));
  const weekDates = Array.from({length:7},(_,i)=>{
    const d = new Date(monday); d.setDate(monday.getDate()+i);
    return {m:d.getMonth()+1, d:d.getDate()};
  });
  const todayBdays = BIRTHDAYS.filter(b => b.month===today.m && b.day===today.d);
  const weekBdays  = BIRTHDAYS.filter(b => weekDates.some(w=>w.m===b.month&&w.d===b.day) && !(b.month===today.m&&b.day===today.d));

  // If nothing this week, look ahead up to 60 days
  let upcomingBdays = [];
  if (!todayBdays.length && !weekBdays.length) {
    for (let offset = 1; offset <= 60; offset++) {
      const d = new Date(now);
      d.setDate(now.getDate() + offset);
      const m = d.getMonth() + 1, day = d.getDate();
      const found = BIRTHDAYS.filter(b => b.month === m && b.day === day);
      found.forEach(b => upcomingBdays.push({ ...b, offset }));
      if (upcomingBdays.length >= 4) break;
    }
  }

  if (todayBdays.length || weekBdays.length || upcomingBdays.length) {
    const bdCard = document.createElement('div');
    bdCard.className = 'card';
    let bdContent = '';
    let cardLabel = 'Birthdays This Week';

    if (todayBdays.length) {
      cardLabel = '🎂 Happy Birthday!';
      bdContent += `<div class="bday-today">${todayBdays.map(b=>`
        <div style="cursor:pointer;padding:4px 0;-webkit-tap-highlight-color:transparent" onclick='openBdayModal(${JSON.stringify(b)})'>
          🎉 ${b.name}
          <span style="font-size:10px;color:var(--green);margin-left:8px;font-family:var(--mono);letter-spacing:0.08em">TAP TO WISH ▶</span>
        </div>`).join('')}</div>`;
    }
    if (weekBdays.length) {
      bdContent += `<div class="bday-week">${weekBdays.slice(0,5).map(b=>`
        <div style="cursor:pointer;padding:3px 0;-webkit-tap-highlight-color:transparent" onclick='openBdayModal(${JSON.stringify(b)})'>
          ${monNames[b.month-1]} ${b.day} · ${b.name}
        </div>`).join('')}</div>`;
    }
    if (upcomingBdays.length) {
      cardLabel = 'Coming Up · Birthdays';
      bdContent += `<div class="bday-week">${upcomingBdays.slice(0,4).map(b=>{
        const inLabel = b.offset === 1 ? 'Tomorrow' : `In ${b.offset} days`;
        return `<div style="cursor:pointer;padding:3px 0;-webkit-tap-highlight-color:transparent" onclick='openBdayModal(${JSON.stringify(b)})'>
          ${monNames[b.month-1]} ${b.day} · ${b.name}
          <span style="font-size:10px;color:var(--text-dim);margin-left:6px;font-family:var(--mono)">${inLabel}</span>
        </div>`;
      }).join('')}</div>`;
    }

    bdCard.innerHTML = `
      <div class="card-header">
        <span class="card-label">${cardLabel}</span>
      </div>
      <div class="card-body">${bdContent}</div>`;
    sections.push(bdCard);
  }

  /* ── QUICK MESSAGE ── */
  if (quickMsg && quickMsg.line1) {
    const sender = quickMsg.sender && quickMsg.sender !== 'ANONYMOUS' ? quickMsg.sender : 'Room 27';
    const posted = new Date(quickMsg.timestamp);
    const timeStr = posted.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    const lines = [quickMsg.line1, quickMsg.line2, quickMsg.line3].filter(l=>l&&l.trim());
    const qmCard = document.createElement('div');
    qmCard.className = 'card';
    qmCard.innerHTML = `
      <div class="card-header">
        <span class="card-label">Board Message</span>
        <span class="card-tag">${timeStr}</span>
      </div>
      <div class="card-body">
        <div class="msg-from">From ${sender}</div>
        <div class="msg-text">${lines.join('<br>')}</div>
      </div>`;
    sections.push(qmCard);
  }

  /* ── DID YOU KNOW ── */
  const dayOfYear = Math.floor((now - new Date(now.getFullYear(),0,0))/86400000);
  const fact = FACT_BANK[dayOfYear % FACT_BANK.length];
  const factCard = document.createElement('div');
  factCard.className = 'card';
  factCard.innerHTML = `
    <div class="card-header"><span class="card-label tan">Did You Know?</span></div>
    <div class="card-body"><div class="fact-text">${fact}</div></div>`;
  sections.push(factCard);

  /* ── CODE SCREEN ── */
  const codeData = [
    { letter: 'C', msg1: 'THANK YOU FOR LISTENING', msg2: 'WHEN OTHERS ARE SPEAKING' },
    { letter: 'O', msg1: 'GOOD JOB ARRIVING READY', msg2: 'AND ON TIME EVERY DAY' },
    { letter: 'D', msg1: "IT'S GREAT TO SEE YOU", msg2: 'PUSH THROUGH THE TOUGH STUFF' },
    { letter: 'E', msg1: 'THANK YOU FOR DOING', msg2: 'YOUR HONEST BEST TODAY' },
  ];
  const codeIdx = Math.floor(Date.now() / 10000) % 4; // cycles every 10s
  const code = codeData[codeIdx];
  const codeCard = document.createElement('div');
  codeCard.className = 'card';
  codeCard.innerHTML = `
    <div class="card-header">
      <span class="card-label green">C.O.D.E · ${['COURTEOUS','ON TASK','DETERMINED','EXCELLENCE'][codeIdx]}</span>
    </div>
    <div class="card-body">
      <div class="fact-text">${code.msg1}<br>${code.msg2}</div>
    </div>`;
  sections.push(codeCard);

  /* ── RENDER ── */
  const content = document.getElementById('content');
  content.innerHTML = '';
  sections.forEach(s => content.appendChild(s));
}

/* ════ DATA FETCH ════ */
async function loadData() {
  setSyncStatus('', 'Loading...');
  const params    = new URLSearchParams(window.location.search);
  const uid       = params.get('uid');
  const studentId = params.get('student');
  try {
    const fetches = [
      fetch(`${SCRIPT_URL}?action=quickmsg`).then(r=>r.json()).catch(()=>null),
      fetch(`${SCRIPT_URL}`).then(r=>r.json()).catch(()=>null),
      fetchWeather(WEATHER_LAT, WEATHER_LON),
    ];
    if (uid || studentId) fetches.push(fetchPassStatus(uid, studentId));
    const results      = await Promise.allSettled(fetches);
    const quickMsg     = results[0].value?.status==='ok' ? results[0].value.message : null;
    const calEvents    = results[1].value?.status==='ok' ? results[1].value.events  : [];
    const weatherData  = results[2].value || null;
    const passData     = (uid || studentId) ? results[3]?.value : null;
    render(calEvents, quickMsg, passData, weatherData);
    setSyncStatus('live', 'Live');
  } catch(e) {
    render([], null, null, null);
    setSyncStatus('error', 'Offline');
  }
}

/* ════ MODAL ════ */
function openModal(title, bodyHTML) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = bodyHTML;
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal(e) {
  if (e && e.target !== document.getElementById('modal')) return;
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}
function openScheduleModal(schedKey) {
  const schedule = SCHEDULES[schedKey];
  if (!schedule) return;
  const nm = nowMins();
  let rows = '';
  for (const p of schedule.periods) {
    const start = timeToMins(p.start);
    const end   = timeToMins(p.end);
    const isNow  = nm >= start && nm < end;
    const isPast = nm >= end;
    if (p.break) {
      rows += `<div class="modal-break-row${isPast?' past':''}">
        <span class="modal-break-name">${p.name}</span>
        <span class="modal-break-time">${p.start} – ${p.end}</span>
        ${isNow?'<span class="modal-p-now">NOW</span>':''}
      </div>`;
    } else {
      rows += `<div class="modal-period-row${isNow?' now':isPast?' past':''}">
        <span class="modal-p-name">${p.name}</span>
        <span class="modal-p-time">${p.start} – ${p.end}</span>
        ${isNow?'<span class="modal-p-now">NOW</span>':''}
      </div>`;
    }
  }
  openModal(schedule.label, rows);
}
function openEventModal(evt) {
  const monNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const d = new Date(evt.start);
  const timeStr = evt.allDay ? 'All Day' : fmtTime12(evt.start);
  const dateStr = `${monNames[d.getMonth()]} ${d.getDate()}`;
  openModal('Event Details', `
    <div class="event-detail-title">${evt.title}</div>
    <div class="event-detail-meta">
      📅 ${dateStr}<br>⏰ ${timeStr}
      ${evt.location ? `<br>📍 ${evt.location}` : ''}
    </div>`);
}

/* ── BIRTHDAY MODAL ── */
const BDAY_ICONS = ['🎉','🎂','🎁','🪅','🎈','🥳','🎊'];
const bdayCountCache = {};
async function getBdayCount(name) {
  if (bdayCountCache[name] !== undefined) return bdayCountCache[name];
  try {
    const res  = await fetch(`${SCRIPT_URL}?action=bdaycount&name=${encodeURIComponent(name)}`);
    const data = await res.json();
    bdayCountCache[name] = data.count || 0;
    return bdayCountCache[name];
  } catch(e) { return 0; }
}
async function incrementBday(name) {
  try {
    const res  = await fetch(`${SCRIPT_URL}?action=bdaytap&name=${encodeURIComponent(name)}`);
    const data = await res.json();
    bdayCountCache[name] = data.count || 0;
    return bdayCountCache[name];
  } catch(e) {
    bdayCountCache[name] = (bdayCountCache[name] || 0) + 1;
    return bdayCountCache[name];
  }
}
function openBdayModal(person) {
  const icon = BDAY_ICONS[Math.floor(Math.random() * BDAY_ICONS.length)];
  const wishes = ['HAPPY BIRTHDAY!','HAVE AN AMAZING DAY!','YOU ARE AWESOME!','MAKE IT A GREAT ONE!','WE SEE YOU TODAY!'];
  const wish = wishes[Math.floor(Math.random() * wishes.length)];
  openModal('', `
    <div class="bday-card-modal">
      <span class="bday-icon" id="bdayIcon">${icon}</span>
      <div class="bday-name-big">${person.name}</div>
      <div class="bday-wish">${wish}</div>
      <button class="bday-tap-btn" onclick="tapBday('${person.name.replace(/'/g,"\\'")}')">
        🎉 Send Birthday Wishes
      </button>
      <div class="bday-tap-count" id="bdayCount">Be the first to send wishes!</div>
    </div>`);
  getBdayCount(person.name).then(c => {
    const el = document.getElementById('bdayCount');
    if (el && c > 0) el.textContent = c + ' wish' + (c !== 1 ? 'es' : '') + ' sent so far';
  });
}
function tapBday(name) {
  incrementBday(name).then(count => {
    const el = document.getElementById('bdayCount');
    if (el) el.textContent = count + ' wish' + (count !== 1 ? 'es' : '') + ' sent so far!';
  });
  const icon = document.getElementById('bdayIcon');
  if (icon) {
    icon.style.animation = 'none';
    icon.offsetHeight;
    icon.style.animation = 'bounce 0.5s ease';
    icon.textContent = BDAY_ICONS[Math.floor(Math.random() * BDAY_ICONS.length)];
  }
}

/* ════ PASSABLE ════ */
async function fetchPassStatus(uid, studentId) {
  try {
    // Step 1 — resolve student from UID or student_id
    let student = null;
    let sQuery = `${SUPABASE_URL}/rest/v1/students?select=id,full_name,period,nfc_uid&limit=1`;
    if (uid) sQuery += `&nfc_uid=eq.${uid}`;
    else if (studentId) sQuery += `&id=eq.${studentId}`;
    const sRes  = await fetch(sQuery, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } });
    const sData = await sRes.json();
    student = sData[0] || null;
    if (!student) return null;

    // Step 2 — find open pass
    const passRes  = await fetch(
      `${SUPABASE_URL}/rest/v1/passes?select=*&student_id=eq.${student.id}&time_in=is.null&order=time_out.desc&limit=1`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
    );
    const passes   = await passRes.json();
    const activePass = passes[0] || null;

    // Step 3 — weekly stats (Mon–Sun of current week)
    const weekStart = new Date();
    weekStart.setDate(weekStart.getDate() - (weekStart.getDay() === 0 ? 6 : weekStart.getDay() - 1));
    weekStart.setHours(0,0,0,0);
    const statsRes  = await fetch(
      `${SUPABASE_URL}/rest/v1/passes?select=duration_minutes&student_id=eq.${student.id}&time_out=gte.${weekStart.toISOString()}`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
    );
    const weekPasses = await statsRes.json();
    const weekCount  = weekPasses.length;
    const weekMins   = weekPasses.reduce((sum, p) => sum + (p.duration_minutes || 0), 0);

    return { student, activePass, weekCount, weekMins };
  } catch(e) {
    return null;
  }
}

/* ── PASS CARD RENDER (circle timer) ── */
// Ring constants — radius chosen to fit 140px SVG container
const RING_R        = 54;
const RING_CIRCUM   = 2 * Math.PI * RING_R; // ~339
const PASS_MAX_MINS = 15; // ring fills over 15 min

function renderPassCard(data) {
  if (!data) return null;
  const { student, activePass, weekCount, weekMins } = data;
  const name = student ? student.full_name : 'Student';
  const card = document.createElement('div');
  card.className = 'pass-status-card';

  if (activePass) {
    const timeOutStr = fmtTime12(activePass.time_out);
    card.innerHTML = `
      <div class="card-header">
        <span class="card-label green">Pass Active</span>
        <span class="card-tag">${name}</span>
      </div>
      <div class="pass-circle-wrap">
        <div class="pass-ring-container">
          <svg class="pass-ring-svg" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
            <circle class="pass-ring-bg" cx="60" cy="60" r="${RING_R}"/>
            <circle class="pass-ring-fg" id="passRingFg"
              cx="60" cy="60" r="${RING_R}"
              stroke-dasharray="${RING_CIRCUM}"
              stroke-dashoffset="${RING_CIRCUM}"/>
          </svg>
          <div class="pass-ring-inner">
            <div class="pass-elapsed-time" id="passElapsed">00:00</div>
            <div class="pass-elapsed-label">elapsed</div>
          </div>
        </div>
        <div class="pass-remaining-text" id="passRemaining"></div>
        <div class="pass-reason-block">
          <div class="pass-reason-label">Reason</div>
          <div class="pass-reason-value">${activePass.reason || 'Hall Pass'}</div>
        </div>
        <div class="pass-checkout-block">
          <div class="pass-checkout-label">Checked Out</div>
          <div class="pass-checkout-value">${timeOutStr}</div>
        </div>
        <div class="pass-stats-row">
          <div class="pass-stat-block">
            <span class="pass-stat-num">${weekCount}</span>
            <span class="pass-stat-label">Passes this week</span>
          </div>
          <div class="pass-stat-block">
            <span class="pass-stat-num">${weekMins}</span>
            <span class="pass-stat-label">Total minutes</span>
          </div>
        </div>
        <div class="pass-scan-hint">Scan badge at Room 27 kiosk to check in</div>
      </div>`;

    // Start the live timer after DOM inserts
    setTimeout(() => startPassTimer(activePass.time_out), 50);
    // Start polling for check-in every 15 seconds
    if (student) setTimeout(() => startPassPolling(student.id), 1000);

  } else {
    card.innerHTML = `
      <div class="card-header">
        <span class="card-label green">Pass Status</span>
        <span class="card-tag">${name}</span>
      </div>
      <div class="pass-checked-in-wrap">
        <div class="pass-checked-in-icon">✓</div>
        <div class="pass-checked-in-label">In Class</div>
        <div class="pass-stats-row">
          <div class="pass-stat-block">
            <span class="pass-stat-num">${weekCount}</span>
            <span class="pass-stat-label">Passes this week</span>
          </div>
          <div class="pass-stat-block">
            <span class="pass-stat-num">${weekMins}</span>
            <span class="pass-stat-label">Total minutes</span>
          </div>
        </div>
      </div>`;
  }
  return card;
}

let passTimerInterval = null;
let passPollingInterval = null;

function stopPassPolling() {
  if (passPollingInterval) { clearInterval(passPollingInterval); passPollingInterval = null; }
}

async function pollPassStatus(studentId) {
  try {
    // Check if the active pass has been checked in
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/passes?select=time_in&student_id=eq.${studentId}&time_in=is.null&limit=1`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
    );
    if (!res.ok) return;
    const passes = await res.json();
    if (passes.length === 0) {
      // Pass is gone — student checked in
      stopPassPolling();
      if (passTimerInterval) { clearInterval(passTimerInterval); passTimerInterval = null; }
      // Reload pass data to show "In Class" state
      const params = new URLSearchParams(window.location.search);
      const uid = params.get('uid');
      const studentId2 = params.get('student');
      const freshData = await fetchPassStatus(uid, studentId2);
      const content = document.getElementById('content');
      const oldCard = content.querySelector('.pass-status-card');
      if (oldCard && freshData) {
        const newCard = renderPassCard(freshData);
        if (newCard) oldCard.replaceWith(newCard);
      }
    }
  } catch(e) {}
}

function startPassTimer(timeOutISO) {
  if (passTimerInterval) clearInterval(passTimerInterval);

  function tick() {
    const elapsed  = Math.floor((new Date() - new Date(timeOutISO)) / 1000);
    const mins     = Math.floor(elapsed / 60);
    const secs     = elapsed % 60;
    const display  = String(mins).padStart(2,'0') + ':' + String(secs).padStart(2,'0');

    const elEl  = document.getElementById('passElapsed');
    const remEl = document.getElementById('passRemaining');
    const ringEl = document.getElementById('passRingFg');

    if (!elEl) { clearInterval(passTimerInterval); return; }

    // Determine state
    const isWarning = mins >= 10;
    const isEnding  = mins >= 15;
    const cls = isEnding ? 'ending' : isWarning ? 'warning' : '';

    elEl.textContent = display;
    elEl.className   = 'pass-elapsed-time ' + cls;

    // Ring progress — fills from 0 to full over PASS_MAX_MINS
    const progress   = Math.min(elapsed / (PASS_MAX_MINS * 60), 1);
    const offset     = RING_CIRCUM * (1 - progress);
    if (ringEl) {
      ringEl.style.strokeDashoffset = offset;
      ringEl.className = 'pass-ring-fg ' + cls;
    }

    // Remaining text — show time limit guidance
    if (remEl) {
      const limitSecs = PASS_MAX_MINS * 60;
      const rem = limitSecs - elapsed;
      if (rem > 0) {
        const rMins = Math.floor(rem / 60);
        const rSecs = rem % 60;
        remEl.textContent = String(rMins).padStart(2,'0') + ':' + String(rSecs).padStart(2,'0') + ' remaining';
      } else {
        remEl.textContent = 'Over time limit';
        remEl.style.color = '#cc4444';
      }
    }
  }

  tick();
  passTimerInterval = setInterval(tick, 1000);
}

function startPassPolling(studentId) {
  stopPassPolling();
  if (!studentId) return;
  passPollingInterval = setInterval(() => pollPassStatus(studentId), 15000);
}

  const existing = document.querySelector('.period-timer-card');
  if (existing) {
    const newCard = buildPeriodTimerCard();
    if (newCard) existing.replaceWith(newCard);
  }
}, 5000);
